<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title> 
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #12121e;
        font-family: sans-serif;
        overflow-x: hidden;
    }

    /* 主要容器排版 */
    .main-container {
        min-height: 100vh;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 6vw;
        padding: 40px 20px;
        box-sizing: border-box;
    }

    .panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    /* 展示區 */
    .scene {
        width: 280px;
        height: 360px;
        position: relative;
        background-color: #1b1b2f;
        border-radius: 16px;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.4);
        overflow: hidden;
        /* 使用 Flex 讓內部框架自動置中且緊縮包覆 */
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* 控制面板 */
    .controls {
        display: flex;
        gap: 15px;
        height: 60px;
        align-items: center;
        justify-content: center;
        background-color: #1b1b2f;
        padding: 0 20px;
        border-radius: 30px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    /* 互動按鈕共通樣式 */
    .btn {
        width: 42px;
        height: 42px;
        border-radius: 8px;
        background-color: #2a2a40;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: all 0.2s;
        box-sizing: border-box;
    }
    .btn:hover { background-color: #3f3f5a; transform: translateY(-3px); }
    .btn:active { transform: translateY(1px); }
    .btn.disabled { opacity: 0.3; pointer-events: none; filter: grayscale(100%); }
    
    .pulse { animation: pulseAnim 1.5s infinite; }
    @keyframes pulseAnim {
        0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(0, 210, 255, 0); }
        100% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); }
    }
    .pulse-red { animation: pulseRed 1.5s infinite; }
    @keyframes pulseRed {
        0% { box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(233, 69, 96, 0); }
        100% { box-shadow: 0 0 0 0 rgba(233, 69, 96, 0); }
    }

    /* 左側按鈕圖示 */
    .icon-messy-block { width: 20px; height: 10px; background-color: #e94560; border-radius: 2px; }

    /* 右側按鈕圖示 */
    .icon-macro { width: 24px; height: 24px; border: 3px solid #00d2ff; border-radius: 4px; }
    .icon-mid { width: 24px; height: 24px; border: 2px solid #00d2ff; border-radius: 4px; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; box-sizing: border-box; }
    .icon-mid div { width: 14px; height: 2px; border-bottom: 2px dashed #00d2ff; }
    .icon-micro-red { width: 24px; height: 24px; border: 2px solid #00d2ff; border-radius: 4px; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 1px; padding: 2px; box-sizing: border-box; }
    .icon-micro-red div { background-color: #e94560; border-radius: 1px; }

    /* ================== 左側物件 (基準大小嚴格鎖定 35x18) ================== */
    .messy-block {
        position: absolute;
        width: 35px; /* 固定尺寸 */
        height: 18px; /* 固定尺寸 */
        background-color: #e94560;
        border-radius: 2px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        opacity: 0; 
        will-change: transform;
    }
    .messy-block.falling { animation: dropMessy 0.4s forwards cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes dropMessy {
        0% { transform: translateY(-400px) rotate(0deg); opacity: 0; }
        100% { transform: translateY(0) rotate(var(--rot)); opacity: 1; }
    }

    /* ================== 右側物件 (緊縮包裹，固定方塊大小) ================== */
    
    /* 基準空位與紅色方塊：尺寸與左側 100% 相同 */
    .slot {
        width: 35px; /* 與左側相同 */
        height: 18px; /* 與左側相同 */
        border-radius: 2px;
        background-color: rgba(255, 255, 255, 0.06);
        position: relative;
        flex-shrink: 0;
    }
    .neat-block {
        position: absolute;
        top: 0; left: 0;
        width: 35px; /* 與左側相同 */
        height: 18px; /* 與左側相同 */
        background-color: #e94560;
        border-radius: 2px;
        box-shadow: inset 0 0 2px rgba(0,0,0,0.3), 0 2px 3px rgba(0,0,0,0.4);
        opacity: 0;
    }
    .neat-block.drop-perfect { animation: dropPerfect 0.25s forwards cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes dropPerfect {
        0% { transform: translateY(-200px) scale(0.9); opacity: 0; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* 橫向排列的方塊組 */
    .level-row {
        display: flex;
        gap: 4px; /* 方塊之間極小的微距 */
        justify-content: center;
    }

    /* Level 1: 主外框 (實線，緊密包覆) */
    .macro-box {
        border: 2px solid #00d2ff;
        border-radius: 8px;
        background-color: rgba(0, 210, 255, 0.03);
        padding: 10px; /* 與內部的極小距離 */
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px; /* 層與層之間的距離 */
        opacity: 0;
        transition: opacity 0.5s ease;
        box-sizing: border-box;
    }
    .macro-box.show { opacity: 1; }

    /* Level 2: 中層包覆框 (虛線) */
    .l2-wrapper {
        display: flex;
        flex-direction: row;
        gap: 8px; /* 兩大分類之間的微距 */
    }
    .l2-box {
        border: 1px dashed #00d2ff;
        border-radius: 6px;
        background-color: rgba(0, 210, 255, 0.04);
        padding: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        opacity: 0;
        transition: opacity 0.5s ease;
    }
    .l2-box.show { opacity: 1; }

    /* Level 3: 底層高密度細節 (點線) */
    .l3-wrapper {
        display: flex;
        flex-direction: column; /* 將 L3 垂直排列，確保橫向不超出範圍 */
        gap: 6px;
    }
    .l3-box {
        border: 1px dotted rgba(0, 210, 255, 0.8);
        border-radius: 4px;
        background-color: rgba(0, 210, 255, 0.06);
        padding: 6px;
        display: grid;
        grid-template-columns: repeat(2, 35px); /* 嚴格鎖定為兩個 35px 方塊的寬度 */
        grid-template-rows: repeat(2, 18px); /* 嚴格鎖定為兩個 18px 方塊的高度 */
        gap: 4px; /* 內部微小空位 */
        opacity: 0;
        transition: opacity 0.5s ease;
    }
    .l3-box.show { opacity: 1; }

    @media (max-width: 768px) {
        .main-container { flex-direction: column; gap: 40px; padding-top: 40px; padding-bottom: 60px; }
        .scene { height: 320px; }
    }
</style>
</head>
<body>

<div class="main-container">
    
    <!-- 左側 (毫無框架的堆疊) -->
    <div class="panel">
        <div class="scene" id="scene-left"></div>
        <div class="controls">
            <div class="btn pulse-red" id="btn-add-messy"><div class="icon-messy-block"></div></div>
        </div>
    </div>

    <!-- 右側 (方塊尺寸不變，以最小微距真空包覆) -->
    <div class="panel">
        <div class="scene" id="scene-right">
            
            <!-- Level 1 總框 -->
            <div class="macro-box" id="macro-box">
                <!-- L1 專屬方塊區 (2 個) -->
                <div class="level-row">
                    <div class="slot slot-l1"></div>
                    <div class="slot slot-l1"></div>
                </div>
                
                <div class="l2-wrapper">
                    <!-- Level 2 分類框 A -->
                    <div class="l2-box">
                        <!-- L2 專屬方塊區 (2 個) -->
                        <div class="level-row">
                            <div class="slot slot-l2"></div>
                            <div class="slot slot-l2"></div>
                        </div>
                        <div class="l3-wrapper">
                            <!-- Level 3 終極細節網格 (每個裝 4 個，疊兩層) -->
                            <div class="l3-box">
                                <div class="slot slot-l3"></div><div class="slot slot-l3"></div>
                                <div class="slot slot-l3"></div><div class="slot slot-l3"></div>
                            </div>
                            <div class="l3-box">
                                <div class="slot slot-l3"></div><div class="slot slot-l3"></div>
                                <div class="slot slot-l3"></div><div class="slot slot-l3"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Level 2 分類框 B -->
                    <div class="l2-box">
                        <!-- L2 專屬方塊區 (2 個) -->
                        <div class="level-row">
                            <div class="slot slot-l2"></div>
                            <div class="slot slot-l2"></div>
                        </div>
                        <div class="l3-wrapper">
                            <div class="l3-box">
                                <div class="slot slot-l3"></div><div class="slot slot-l3"></div>
                                <div class="slot slot-l3"></div><div class="slot slot-l3"></div>
                            </div>
                            <div class="l3-box">
                                <div class="slot slot-l3"></div><div class="slot slot-l3"></div>
                                <div class="slot slot-l3"></div><div class="slot slot-l3"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
        
        <div class="controls">
            <!-- 步驟一：展開 L1 實線大框 -->
            <div class="btn pulse" id="btn-step1"><div class="icon-macro"></div></div>
            <!-- 步驟二：展開內部 L2/L3 結構 -->
            <div class="btn disabled" id="btn-step2"><div class="icon-mid"><div></div><div></div></div></div>
            <!-- 步驟三：不斷手動點擊掉落方塊 -->
            <div class="btn disabled" id="btn-step3">
                <div class="icon-micro-red">
                    <div></div><div></div><div></div><div></div>
                    <div></div><div></div><div></div><div></div>
                    <div></div><div></div><div></div><div></div>
                    <div></div><div></div><div></div><div></div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    /* ================= 左側邏輯 (保持不變) ================= */
    const sceneLeft = document.getElementById('scene-left');
    const btnAddMessy = document.getElementById('btn-add-messy');
    let leftCount = 0;
    let isCollapsed = false;

    const stackCoords =[
        { b: 20, l: 122, r: 2 }, { b: 38, l: 115, r: -8 },
        { b: 56, l: 128, r: 12 }, { b: 74, l: 112, r: -15 },
        { b: 92, l: 135, r: 20 }, { b: 110, l: 110, r: -25 }
    ];
    const triggerBlock = { b: 128, l: 122, r: -10 };

    btnAddMessy.addEventListener('click', () => {
        const block = document.createElement('div');
        block.className = 'messy-block falling';
        sceneLeft.appendChild(block);

        if (!isCollapsed && leftCount < stackCoords.length) {
            const pos = stackCoords[leftCount];
            block.style.bottom = pos.b + 'px';
            block.style.left = pos.l + 'px';
            block.style.setProperty('--rot', pos.r + 'deg');
            
        } else if (!isCollapsed && leftCount === stackCoords.length) {
            block.style.bottom = triggerBlock.b + 'px';
            block.style.left = triggerBlock.l + 'px';
            block.style.setProperty('--rot', triggerBlock.r + 'deg');
            
            isCollapsed = true;
            setTimeout(collapseAll, 400);

        } else {
            block.style.bottom = (Math.random() * 20 + 5) + 'px';
            block.style.left = (Math.random() * 210 + 20) + 'px';
            block.style.setProperty('--rot', ((Math.random() - 0.5) * 180) + 'deg');
        }

        leftCount++;
    });

    function collapseAll() {
        const blocks = document.querySelectorAll('#scene-left .messy-block');
        blocks.forEach(block => {
            block.style.opacity = '1';
            const currentRot = block.style.getPropertyValue('--rot') || '0deg';
            block.style.transform = `translate(0px, 0px) rotate(${currentRot})`;
            block.style.animation = 'none';
            void block.offsetWidth; 
            block.style.transition = 'transform 0.65s cubic-bezier(0.55, 0.085, 0.68, 0.53)';
            
            const currentB = parseInt(block.style.bottom); 
            const floorB = Math.random() * 15 + 2;
            const dropY = currentB - floorB; 
            const scatterForce = currentB * 0.8; 
            const dropX = (Math.random() - 0.5) * scatterForce * 2;
            const dropRot = (Math.random() - 0.5) * 400;
            
            block.style.transform = `translate(${dropX}px, ${dropY}px) rotate(${dropRot}deg)`;
        });
    }

    /* ================= 右側邏輯 (手動按層次連點填入) ================= */
    const btnStep1 = document.getElementById('btn-step1');
    const btnStep2 = document.getElementById('btn-step2');
    const btnStep3 = document.getElementById('btn-step3');
    
    const macroBox = document.getElementById('macro-box');
    const l2Boxes = document.querySelectorAll('.l2-box');
    const l3Boxes = document.querySelectorAll('.l3-box');
    
    let rightStep = 0;
    let currentSlotIndex = 0;
    let allSlots =[];

    btnStep1.addEventListener('click', () => {
        if (rightStep === 0) {
            macroBox.classList.add('show');
            btnStep1.classList.remove('pulse');
            btnStep1.classList.add('disabled');
            
            btnStep2.classList.remove('disabled');
            btnStep2.classList.add('pulse');
            rightStep = 1;
            
            // 將所有空位依照層級 (L1 -> L2 -> L3) 加入清單
            allSlots =[
                ...document.querySelectorAll('.slot-l1'),
                ...document.querySelectorAll('.slot-l2'),
                ...document.querySelectorAll('.slot-l3')
            ];
        }
    });

    btnStep2.addEventListener('click', () => {
        if (rightStep === 1) {
            
            l2Boxes.forEach((box, index) => {
                setTimeout(() => box.classList.add('show'), index * 150);
            });

            l3Boxes.forEach((box, index) => {
                setTimeout(() => box.classList.add('show'), 300 + index * 100);
            });

            btnStep2.classList.remove('pulse');
            btnStep2.classList.add('disabled');
            
            setTimeout(() => {
                btnStep3.classList.remove('disabled');
                btnStep3.classList.add('pulse-red');
                rightStep = 2;
            }, 600);
        }
    });

    // 手動狂點模式：點擊一次，100% 填滿一格，從上層往下層依序填入
    btnStep3.addEventListener('click', () => {
        if (rightStep === 2 && currentSlotIndex < allSlots.length) {
            
            const neatBlock = document.createElement('div');
            neatBlock.className = 'neat-block drop-perfect';
            allSlots[currentSlotIndex].appendChild(neatBlock);
            
            currentSlotIndex++;

            if (currentSlotIndex === allSlots.length) {
                btnStep3.classList.remove('pulse-red');
                btnStep3.classList.add('disabled');
                rightStep = 3;
            }
        }
    });

</script>
</body>
</html>
