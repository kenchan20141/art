<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art 8</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background-color: #050505;
        cursor: ew-resize; /* 提示用戶可以左右拖曳 */
    }
    canvas {
        display: block;
    }
    /* 一個極簡的進度條，位於底部，作為唯一的視覺提示 */
    .progress-line {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 2px;
        background: #333;
        width: 100%;
        pointer-events: none;
    }
    .progress-fill {
        height: 100%;
        background: #00d2ff;
        width: 0%;
        box-shadow: 0 0 10px #00d2ff;
        transition: width 0.1s linear;
    }
</style>
</head>
<body>

<div class="progress-line"><div class="progress-fill" id="bar"></div></div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const progressBar = document.getElementById('bar');

    let width, height;
    let particles = [];
    // 進度：0.0 = 點, 0.33 = 線, 0.66 = 面, 1.0 = 立體
    let progress = 0; 
    let targetProgress = 0;

    // 定義粒子數量
    const PARTICLE_COUNT = 180;
    // 連線距離閾值
    const CONNECT_DIST = 100;

    class Particle {
        constructor(index) {
            this.index = index;
            
            // 1. 設定最終形態 (球體/立體) 的目標位置
            // 使用黃金螺旋算法分佈點在球面上
            const phi = Math.acos(1 - 2 * (index + 0.5) / PARTICLE_COUNT);
            const theta = Math.PI * (1 + Math.sqrt(5)) * (index + 0.5);
            const r = 250; // 球體半徑

            this.targetX = r * Math.sin(phi) * Math.cos(theta);
            this.targetY = r * Math.sin(phi) * Math.sin(theta);
            this.targetZ = r * Math.cos(phi);

            // 2. 設定初始形態 (混沌) 的位置
            // 隨機散佈在更大的空間
            this.chaosX = (Math.random() - 0.5) * 1500;
            this.chaosY = (Math.random() - 0.5) * 1500;
            this.chaosZ = (Math.random() - 0.5) * 1500;

            // 當前位置
            this.x = this.chaosX;
            this.y = this.chaosY;
            this.z = this.chaosZ;

            // 顏色 (隨機微調青色/白色)
            this.baseColor = Math.random() > 0.8 ? [255, 255, 255] : [0, 210, 255];
        }

        update(prog) {
            // 使用線性插值 (Lerp) 根據進度改變位置
            // prog 0 -> chaos position
            // prog 1 -> target (sphere) position
            // 加入一些緩動讓移動更自然
            const ease = prog < 0.5 ? 2 * prog * prog : -1 + (4 - 2 * prog) * prog;
            
            this.x = this.chaosX + (this.targetX - this.chaosX) * ease;
            this.y = this.chaosY + (this.targetY - this.chaosY) * ease;
            this.z = this.chaosZ + (this.targetZ - this.chaosZ) * ease;
        }

        project(rotX, rotY) {
            // 3D 旋轉
            let y = this.y;
            let z = this.z;
            
            // X軸旋轉
            let cosX = Math.cos(rotX);
            let sinX = Math.sin(rotX);
            let y1 = y * cosX - z * sinX;
            let z1 = z * cosX + y * sinX;

            // Y軸旋轉
            let x = this.x;
            let cosY = Math.cos(rotY);
            let sinY = Math.sin(rotY);
            let x2 = x * cosY - z1 * sinY;
            let z2 = z1 * cosY + x * sinY;

            // 透視投影
            const fov = 800;
            const scale = fov / (fov + z2 + 800); // +800 是相機距離
            const x2d = x2 * scale + width / 2;
            const y2d = y1 * scale + height / 2;

            return { x: x2d, y: y2d, z: z2, scale: scale };
        }
    }

    function init() {
        resize();
        window.addEventListener('resize', resize);
        
        // 初始化粒子
        particles = [];
        for(let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle(i));
        }

        // 綁定互動事件
        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchmove', handleInput, { passive: false });
        // 點擊也可跳轉
        window.addEventListener('mousedown', handleInput); 
        window.addEventListener('touchstart', handleInput, { passive: false });

        loop();
    }

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    function handleInput(e) {
        // 防止手機上的滾動
        if(e.type === 'touchmove') e.preventDefault();

        let clientX;
        if (e.touches) {
            clientX = e.touches[0].clientX;
        } else {
            clientX = e.clientX;
        }

        // 計算水平百分比 (0.0 到 1.0)
        targetProgress = Math.max(0, Math.min(1, clientX / width));
    }

    let time = 0;

    function loop() {
        requestAnimationFrame(loop);

        // 背景清空 (帶有一點點拖尾效果，讓運動更平滑)
        ctx.fillStyle = 'rgba(5, 5, 8, 1)'; 
        ctx.fillRect(0, 0, width, height);

        // 平滑過渡進度
        progress += (targetProgress - progress) * 0.1;
        
        // 更新 UI 條
        progressBar.style.width = (progress * 100) + '%';

        // 自動旋轉
        time += 0.005;
        // 當進度越高，旋轉越快一點，形成結構感
        const rotY = time * (0.5 + progress); 
        const rotX = time * 0.3;

        // 更新並投影所有粒子
        const projected = [];
        particles.forEach(p => {
            p.update(progress);
            projected.push(p.project(rotX, rotY));
        });

        // 根據進度決定繪製邏輯
        // 階段定義:
        // 0.0 - 0.3: 只有點 (Dots)
        // 0.3 - 0.6: 點 + 線 (Lines)
        // 0.6 - 1.0: 點 + 線 + 面 (Planes)

        // 1. 繪製連線與面
        if (progress > 0.1) {
            // 為了效能，不要雙重迴圈遍歷所有點，只遍歷附近的
            // 但為了簡單與視覺效果，這裡我們只連接距離近的
            
            ctx.lineWidth = 1;

            for (let i = 0; i < projected.length; i++) {
                const p1 = projected[i];
                // 優化：只檢查一部分，或者基於索引檢查 (因為我們的目標是球體，索引相近的通常在球面上也近)
                // 這裡簡單暴力一點，但為了風格，限制連線數量
                
                let connections = 0;
                for (let j = i + 1; j < projected.length; j++) {
                    const p2 = projected[j];
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);

                    // 根據 Scale 調整連線距離 (遠處的連線判定要更嚴格)
                    const limit = CONNECT_DIST * ((p1.scale + p2.scale) / 2);

                    if (dist < limit) {
                        connections++;
                        
                        // 計算透明度：基於距離 以及 當前進度
                        // 進度 0.1~0.4 之間，線條逐漸浮現
                        let lineOpacity = (1 - dist / limit) * 0.8;
                        
                        // 線條出現的轉場
                        let phaseLine = Math.min(1, Math.max(0, (progress - 0.1) * 3));
                        lineOpacity *= phaseLine;

                        if (lineOpacity > 0.05) {
                            ctx.strokeStyle = `rgba(0, 210, 255, ${lineOpacity})`;
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }

                        // 繪製面 (三角形)
                        // 僅當進度 > 0.6
                        if (progress > 0.6 && connections < 3) { // 限制每個點的面數量，避免過於雜亂
                             for (let k = j + 1; k < projected.length; k++) {
                                const p3 = projected[k];
                                const d2 = Math.sqrt((p2.x - p3.x)**2 + (p2.y - p3.y)**2);
                                const d3 = Math.sqrt((p1.x - p3.x)**2 + (p1.y - p3.y)**2);

                                if (d2 < limit && d3 < limit) {
                                    // 面的轉場
                                    let phasePlane = Math.min(1, Math.max(0, (progress - 0.6) * 3));
                                    let planeAlpha = phasePlane * 0.15; // 很淡的透明度

                                    ctx.fillStyle = `rgba(0, 210, 255, ${planeAlpha})`;
                                    ctx.beginPath();
                                    ctx.moveTo(p1.x, p1.y);
                                    ctx.lineTo(p2.x, p2.y);
                                    ctx.lineTo(p3.x, p3.y);
                                    ctx.fill();
                                    
                                    // 只畫一個三角形就跳出，避免過度重疊
                                    break;
                                }
                             }
                        }
                    }
                }
            }
        }

        // 2. 繪製點 (永遠繪製，但在初期比較大)
        projected.forEach((p, index) => {
            const originalColor = particles[index].baseColor;
            
            // 點的大小：在混沌期(0)比較大且虛，在立體期(1)比較精細
            let size = 2 * p.scale;
            if (progress < 0.2) size *= (2 - progress * 5); // 0.0時放大

            // 點的透明度
            let alpha = 0.8 + Math.random() * 0.2; // 閃爍
            
            ctx.fillStyle = `rgba(${originalColor[0]}, ${originalColor[1]}, ${originalColor[2]}, ${alpha})`;
            
            ctx.beginPath();
            ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    init();
</script>
</body>
</html>
