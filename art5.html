<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Absorb?Apply?</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030308;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #universe {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* 永恆畫布：記錄文化底蘊與粗暴的機械傷痕 */
        #eternityCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 動態畫布：所有即時互動 */
        #interactiveCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            cursor: crosshair;
        }

        #interactiveCanvas.dragging {
            cursor: grabbing;
        }
    </style>
</head>
<body>

    <div id="universe">
        <canvas id="eternityCanvas"></canvas>
        <canvas id="interactiveCanvas"></canvas>
    </div>

<script>
    const iCanvas = document.getElementById('interactiveCanvas');
    const iCtx = iCanvas.getContext('2d');
    const eCanvas = document.getElementById('eternityCanvas');
    const eCtx = eCanvas.getContext('2d');

    let w, h;
    
    // 預設為急功近利的「非吸收 (APPLY)」模式
    let isAbsorbMode = false; 
    let isDraggingCore = false;
    let isChargingVortex = false;
    
    let pressStartTime = 0;
    let hasPointerMoved = false;

    // 實體陣列
    let knowledgeGems = [];  
    let nebulas =[];        
    let vectors = [];        
    let debris = [];         
    let visualImpacts =[];  // 純視覺的「虛假正向回饋」閃光

    let pointer = { x: -1000, y: -1000, vx: 0, vy: 0 };
    let lastPointer = { x: -1000, y: -1000 };

    const core = {
        x: 0, y: 0,
        radius: 40,
        angle: 0,
        pulse: 0,
        targetX: 0, targetY: 0
    };

    const colors = {
        knowledge:['#e0e7ff', '#c4b5fd', '#fef08a', '#93c5fd'],
        absorb:['#10b981', '#8b5cf6', '#f59e0b', '#059669'],
        apply: ['#ef4444', '#ffffff', '#ff1111'] // 刺眼的紅與純白
    };

    function init() {
        w = iCanvas.width = eCanvas.width = window.innerWidth;
        h = iCanvas.height = eCanvas.height = window.innerHeight;
        core.x = core.targetX = w / 2;
        core.y = core.targetY = h / 2;
        
        eCtx.fillStyle = '#030308';
        eCtx.fillRect(0, 0, w, h);

        // 預先生成一些柔和的文化底蘊，讓玩家一開始就有美好的事物可以「破壞」
        for(let i=0; i<150; i++){
            eCtx.beginPath();
            eCtx.arc(Math.random()*w, Math.random()*h, Math.random()*30+10, 0, Math.PI*2);
            eCtx.fillStyle = colors.absorb[Math.floor(Math.random()*colors.absorb.length)];
            eCtx.globalAlpha = 0.04;
            eCtx.fill();
        }
        eCtx.globalAlpha = 1.0;
    }
    window.addEventListener('resize', init);
    init();

    // ==========================================
    // 互動事件
    // ==========================================

    function handlePointerDown(e) {
        if (e.cancelable) e.preventDefault();
        let px = e.clientX || e.touches[0].clientX;
        let py = e.clientY || e.touches[0].clientY;
        pointer.x = px; pointer.y = py;
        lastPointer.x = px; lastPointer.y = py;

        pressStartTime = Date.now();
        hasPointerMoved = false;

        if (Math.hypot(px - core.x, py - core.y) < core.radius * 2) {
            isDraggingCore = true;
            iCanvas.classList.add('dragging');
        } else {
            isChargingVortex = true;
        }
    }

    function handlePointerMove(e) {
        if (e.cancelable) e.preventDefault();
        let px = e.clientX || (e.touches ? e.touches[0].clientX : pointer.x);
        let py = e.clientY || (e.touches ? e.touches[0].clientY : pointer.y);
        
        if (Math.hypot(px - pointer.x, py - pointer.y) > 10) {
            hasPointerMoved = true;
        }

        pointer.vx = px - lastPointer.x;
        pointer.vy = py - lastPointer.y;
        lastPointer.x = px; lastPointer.y = py;
        pointer.x = px; pointer.y = py;

        if (isDraggingCore) {
            core.targetX = px;
            core.targetY = py;
        }

        if(Math.random() < 0.3) spawnKnowledge(px, py);
    }

    function handlePointerUp(e) {
        if (e.cancelable) e.preventDefault();
        let pressDuration = Date.now() - pressStartTime;

        if (pressDuration < 250 && !hasPointerMoved) {
            togglePhilosophy();
        }

        isDraggingCore = false;
        isChargingVortex = false;
        iCanvas.classList.remove('dragging');
    }

    iCanvas.addEventListener('mousedown', handlePointerDown);
    iCanvas.addEventListener('mousemove', handlePointerMove);
    window.addEventListener('mouseup', handlePointerUp);
    iCanvas.addEventListener('touchstart', handlePointerDown, {passive: false});
    iCanvas.addEventListener('touchmove', handlePointerMove, {passive: false});
    window.addEventListener('touchend', handlePointerUp);

    function togglePhilosophy() {
        isAbsorbMode = !isAbsorbMode;
        core.pulse = isAbsorbMode ? 80 : -50; 
        
        // 切換時的視覺衝擊波
        iCtx.beginPath();
        iCtx.arc(core.x, core.y, core.radius * 4, 0, Math.PI * 2);
        iCtx.strokeStyle = isAbsorbMode ? '#10b981' : '#ef4444';
        iCtx.lineWidth = 15;
        iCtx.stroke();
    }

    setInterval(() => {
        // APPLY 模式生成更多知識，暗示貪婪與消耗極大
        let maxGems = isAbsorbMode ? 100 : 250; 
        if(knowledgeGems.length < maxGems) {
            let spawnX = Math.random() < 0.5 ? -20 : w + 20;
            let spawnY = Math.random() * h;
            if(Math.random() < 0.5) {
                spawnX = Math.random() * w;
                spawnY = Math.random() < 0.5 ? -20 : h + 20;
            }
            spawnKnowledge(spawnX, spawnY);
        }
    }, 40);

    function spawnKnowledge(x, y) {
        knowledgeGems.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 1.5,
            vy: (Math.random() - 0.5) * 1.5,
            color: colors.knowledge[Math.floor(Math.random() * colors.knowledge.length)],
            size: Math.random() * 2 + 1,
            mass: Math.random() * 0.8 + 0.5
        });
    }

    // ==========================================
    // 動畫主迴圈
    // ==========================================

    function animate() {
        iCtx.globalCompositeOperation = 'source-over';
        // APPLY 模式拖影更短，給人一種生硬、缺乏底蘊的視覺感
        iCtx.fillStyle = isAbsorbMode ? 'rgba(3, 3, 8, 0.25)' : 'rgba(3, 3, 8, 0.85)';
        iCtx.fillRect(0, 0, w, h);

        updateCore();
        handleKnowledge();
        handleVectorsAndDebris();
        handleNebulas();
        handleVisualImpacts();
        drawVortex();

        requestAnimationFrame(animate);
    }

    function updateCore() {
        iCtx.globalCompositeOperation = 'lighter';
        
        core.x += (core.targetX - core.x) * 0.15;
        core.y += (core.targetY - core.y) * 0.15;
        
        // APPLY 模式轉速極端狂暴
        core.angle += isAbsorbMode ? 0.005 : 0.3;
        core.pulse *= 0.8; 
        let currentRadius = Math.max(15, core.radius + core.pulse);

        iCtx.save();
        iCtx.translate(core.x, core.y);
        iCtx.rotate(core.angle);

        if (isAbsorbMode) {
            // ABSORB：有機、緩慢呼吸的發光生命體
            let grad = iCtx.createRadialGradient(0, 0, 0, 0, 0, currentRadius * 2);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            grad.addColorStop(0.2, 'rgba(16, 185, 129, 0.9)'); 
            grad.addColorStop(0.6, 'rgba(139, 92, 246, 0.4)'); 
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            iCtx.fillStyle = grad;
            iCtx.beginPath();
            iCtx.arc(0, 0, currentRadius * 2, 0, Math.PI * 2);
            iCtx.fill();

            iCtx.strokeStyle = `rgba(245, 158, 11, ${0.4 + Math.sin(Date.now()*0.002)*0.4})`;
            iCtx.lineWidth = 2;
            iCtx.beginPath();
            iCtx.arc(0, 0, currentRadius * 0.8, 0, Math.PI * 2);
            iCtx.stroke();

        } else {
            // APPLY：冰冷、鋒利、急速旋轉的工業鋸齒絞肉機
            iCtx.strokeStyle = '#ef4444';
            iCtx.lineWidth = 5;
            
            iCtx.beginPath();
            for(let i = 0; i < 16; i++) {
                let a = i * Math.PI / 8;
                iCtx.moveTo(Math.cos(a) * currentRadius * 0.7, Math.sin(a) * currentRadius * 0.7);
                // 銳利的幾何尖刺
                iCtx.lineTo(Math.cos(a) * currentRadius * 1.5, Math.sin(a) * currentRadius * 1.5);
            }
            iCtx.stroke();

            // 內核機械方塊
            iCtx.rotate(-core.angle * 1.5);
            iCtx.fillStyle = '#ffffff';
            iCtx.fillRect(-currentRadius*0.6, -currentRadius*0.6, currentRadius*1.2, currentRadius*1.2);
            
            // 刺眼高頻閃爍紅光
            iCtx.fillStyle = `rgba(239, 68, 68, ${0.2 + Math.random()*0.4})`;
            iCtx.fillRect(-currentRadius*1.5, -currentRadius*1.5, currentRadius*3, currentRadius*3);
        }
        iCtx.restore();
    }

    function drawVortex() {
        if (!isChargingVortex || Date.now() - pressStartTime < 200) return;
        iCtx.globalCompositeOperation = 'lighter';
        iCtx.beginPath();
        
        if (isAbsorbMode) {
            iCtx.arc(pointer.x, pointer.y, 100 + Math.sin(Date.now()*0.01)*20, 0, Math.PI * 2);
            iCtx.strokeStyle = 'rgba(139, 92, 246, 0.5)';
            iCtx.lineWidth = 4;
            iCtx.stroke();
        } else {
            // APPLY 模式下的黑洞是生硬的旋轉方形陣列
            iCtx.save();
            iCtx.translate(pointer.x, pointer.y);
            iCtx.rotate(Date.now() * 0.01);
            iCtx.strokeStyle = 'rgba(239, 68, 68, 0.8)';
            iCtx.lineWidth = 6;
            let size = 80 + Math.random()*20;
            iCtx.strokeRect(-size, -size, size*2, size*2);
            iCtx.restore();
        }
    }

    function handleKnowledge() {
        iCtx.globalCompositeOperation = 'lighter';
        
        for (let i = knowledgeGems.length - 1; i >= 0; i--) {
            let p = knowledgeGems[i];
            
            let dx = core.x - p.x;
            let dy = core.y - p.y;
            let distToCore = Math.hypot(dx, dy);
            
            // APPLY 模式的引力極度野蠻
            let force = isAbsorbMode ? 0.06 : 0.8; 
            p.vx += (dx / distToCore) * force * p.mass;
            p.vy += (dy / distToCore) * force * p.mass;

            if (isChargingVortex && Date.now() - pressStartTime > 200) {
                let vdx = pointer.x - p.x;
                let vdy = pointer.y - p.y;
                let vDist = Math.hypot(vdx, vdy);
                p.vx += (vdx / vDist) * (isAbsorbMode?0.6:1.5);
                p.vy += (vdy / vDist) * (isAbsorbMode?0.6:1.5);
                p.vx += (vdy / vDist) * (isAbsorbMode?0.3:0.1); // Apply 少了旋轉美感，只有直線拉扯
                p.vy -= (vdx / vDist) * (isAbsorbMode?0.3:0.1);
            }

            p.vx *= (isAbsorbMode ? 0.96 : 0.92); // Apply 模式急起急停
            p.vy *= (isAbsorbMode ? 0.96 : 0.92);
            p.x += p.vx;
            p.y += p.vy;

            // 繪製軌跡
            iCtx.beginPath();
            if(!isAbsorbMode && Math.hypot(p.vx, p.vy) > 4) {
                // APPLY 模式：知識被殘酷地拉長成直線速度線
                iCtx.moveTo(p.x, p.y);
                iCtx.lineTo(p.x - p.vx*3, p.y - p.vy*3);
                iCtx.strokeStyle = p.color;
                iCtx.lineWidth = p.size;
                iCtx.stroke();
            } else {
                iCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                iCtx.fillStyle = p.color;
                iCtx.fill();
            }

            // 撞擊核心
            if (distToCore < core.radius) {
                if (!isAbsorbMode) {
                    // APPLY 模式：異化為鋒利的幾何雷射
                    vectors.push({
                        x: core.x, y: core.y,
                        vx: (Math.random() - 0.5) * 80, // 極端暴力的射出速度
                        vy: (Math.random() - 0.5) * 80,
                        color: colors.apply[Math.floor(Math.random() * colors.apply.length)]
                    });
                    core.pulse = -15; // 機械反衝
                    
                    // 【純視覺虛假回饋】：生成劇烈擴張的紅色方塊/十字，像遊戲得分一樣刺激多巴胺
                    if(Math.random() < 0.4) {
                        visualImpacts.push({
                            x: core.x, y: core.y,
                            size: 10, max: 150 + Math.random()*150,
                            speed: 15 + Math.random()*10,
                            type: Math.random() < 0.5 ? 'square' : 'cross'
                        });
                    }
                    
                    // 【永久破壞】：以生硬的直角方塊直接挖去美麗的星雲背景
                    eCtx.globalCompositeOperation = 'destination-out';
                    eCtx.fillRect(core.x - 60 + (Math.random()-0.5)*180, core.y - 60 + (Math.random()-0.5)*180, 50, 50);
                    
                } else {
                    // ABSORB 模式：轉化為文化底蘊的柔和星雲
                    for(let k=0; k<3; k++){
                        nebulas.push({
                            x: core.x, y: core.y,
                            vx: (Math.random() - 0.5) * 4,
                            vy: (Math.random() - 0.5) * 4,
                            color: colors.absorb[Math.floor(Math.random() * colors.absorb.length)],
                            size: Math.random() * 5 + 3,
                            life: 250 + Math.random() * 200,
                            wobble: Math.random() * Math.PI * 2
                        });
                    }
                    core.pulse = 12; 
                }
                knowledgeGems.splice(i, 1);
            }
        }
    }

    // 處理純視覺的功利主義「得分/命中」閃光特效
    function handleVisualImpacts() {
        if (isAbsorbMode) return;
        iCtx.globalCompositeOperation = 'lighter';
        
        for(let i = visualImpacts.length -1; i >= 0; i--) {
            let v = visualImpacts[i];
            v.size += v.speed;
            
            iCtx.strokeStyle = `rgba(239, 68, 68, ${1 - v.size/v.max})`;
            iCtx.lineWidth = 4;
            
            iCtx.save();
            iCtx.translate(v.x, v.y);
            iCtx.beginPath();
            
            if (v.type === 'square') {
                iCtx.rect(-v.size/2, -v.size/2, v.size, v.size);
            } else {
                iCtx.moveTo(-v.size, 0); iCtx.lineTo(v.size, 0);
                iCtx.moveTo(0, -v.size); iCtx.lineTo(0, v.size);
            }
            
            iCtx.stroke();
            iCtx.restore();

            if(v.size > v.max) visualImpacts.splice(i, 1);
        }
    }

    function handleVectorsAndDebris() {
        iCtx.globalCompositeOperation = 'source-over';
        
        // 實用主義雷射射線
        for (let i = vectors.length - 1; i >= 0; i--) {
            let v = vectors[i];
            
            iCtx.beginPath();
            iCtx.moveTo(v.x, v.y);
            v.x += v.vx;
            v.y += v.vy;
            iCtx.lineTo(v.x, v.y);
            iCtx.strokeStyle = v.color;
            iCtx.lineWidth = 6;
            iCtx.stroke();

            // 雷射掃過的地方，會在永恆畫布上留下死灰色的數位壞點(雜訊方塊)
            if (Math.random() < 0.4) {
                eCtx.globalCompositeOperation = 'source-over';
                eCtx.fillStyle = Math.random() > 0.5 ? 'rgba(80, 80, 80, 0.4)' : 'rgba(30, 30, 30, 0.4)';
                let bSize = Math.random() * 15 + 5;
                eCtx.fillRect(v.x - bSize/2, v.y - bSize/2, bSize, bSize);
            }

            // 撞擊現實邊界：瞬間粉碎成大量無用且缺乏美感的廢料
            if (v.x < 0 || v.x > w || v.y < 0 || v.y > h) {
                for (let j = 0; j < 8; j++) {
                    debris.push({
                        x: v.x, y: v.y,
                        vx: -v.vx * 0.03 + (Math.random() - 0.5) * 12,
                        vy: -v.vy * 0.03 + (Math.random() - 0.5) * 12,
                        life: 30 + Math.random() * 20
                    });
                }
                vectors.splice(i, 1);
            }
        }

        // 死灰廢料的拋物線與墜落
        for (let i = debris.length - 1; i >= 0; i--) {
            let d = debris[i];
            d.x += d.vx;
            d.y += d.vy;
            d.life--;

            iCtx.fillStyle = `rgba(150, 150, 150, ${d.life / 50})`;
            // 生硬的方形碎屑，毫無生命力
            iCtx.fillRect(d.x, d.y, 6, 6);

            if (d.life <= 0) debris.splice(i, 1);
        }
    }

    function handleNebulas() {
        eCtx.globalCompositeOperation = 'screen';
        
        for (let i = nebulas.length - 1; i >= 0; i--) {
            let n = nebulas[i];
            
            n.wobble += 0.08;
            n.vx += Math.cos(n.wobble) * 0.2;
            n.vy += Math.sin(n.wobble) * 0.2;
            
            let speed = Math.hypot(n.vx, n.vy);
            if (speed > 1.5) {
                n.vx = (n.vx / speed) * 1.5;
                n.vy = (n.vy / speed) * 1.5;
            }

            n.x += n.vx;
            n.y += n.vy;
            n.life--;
            n.size *= 0.995; 

            // 畫在永恆背景，成為柔和的底蘊
            eCtx.beginPath();
            eCtx.arc(n.x, n.y, Math.max(0.1, n.size), 0, Math.PI * 2);
            eCtx.fillStyle = n.color;
            eCtx.globalAlpha = 0.05;
            eCtx.fill();
            eCtx.globalAlpha = 1.0;

            if (Math.random() < 0.03 && n.size > 1.5 && nebulas.length < 500) {
                nebulas.push({
                    x: n.x, y: n.y,
                    vx: n.vx + (Math.random() - 0.5)*1.5,
                    vy: n.vy + (Math.random() - 0.5)*1.5,
                    color: colors.absorb[Math.floor(Math.random() * colors.absorb.length)],
                    size: n.size * 0.85,
                    life: n.life,
                    wobble: Math.random() * Math.PI * 2
                });
            }

            if (n.life <= 0 || n.size < 0.2) nebulas.splice(i, 1);
        }
    }

    animate();
</script>
</body>
</html>
