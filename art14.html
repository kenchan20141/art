<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>關係的狀態</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #050507;
        overflow: hidden;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
    }
    canvas {
        display: block;
        width: 100%;
        height: 100%;
    }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 狀態定義
    const STATE_SEARCHING = 0;
    const STATE_CLASH = 1;
    const STATE_PARALLEL = 2;
    let currentState = STATE_SEARCHING;
    let previousState = STATE_SEARCHING; // 用於追蹤狀態切換
    let stateProgress = 0; 

    // 震動控制變數
    let lastVibrateTime = 0;

    // 實體設定
    const r = Math.min(width, height) * 0.08;
    const gapAngle = Math.PI / 2.5;
    
    let p1 = { x: width * 0.3, y: height * 0.5, r: r, angle: 0, targetAngle: 0, isDragging: false };
    let p2 = { x: width * 0.7, y: height * 0.5, r: r, angle: Math.PI, targetAngle: Math.PI, isDragging: false };

    // 粒子系統 (落寞的人間)
    const particles =[];
    const numParticles = 150;
    for(let i=0; i<numParticles; i++) {
        particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 0.5,
            vy: Math.random() * 1 + 0.5,
            size: Math.random() * 2 + 0.5,
            baseAlpha: Math.random() * 0.5 + 0.1
        });
    }

    // 互動控制
    let pointerX = 0, pointerY = 0;
    let activeP = null;

    function getDistance(x1, y1, x2, y2) {
        return Math.hypot(x2 - x1, y2 - y1);
    }

    function lerp(a, b, n) {
        return (1 - n) * a + n * b;
    }

    function lerpAngle(a, b, n) {
        let diff = b - a;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        return a + diff * n;
    }

    function onPointerDown(e) {
        let x = e.clientX || (e.touches && e.touches[0].clientX);
        let y = e.clientY || (e.touches && e.touches[0].clientY);
        
        if (getDistance(x, y, p1.x, p1.y) < p1.r * 1.5) {
            p1.isDragging = true;
            activeP = p1;
        } else if (getDistance(x, y, p2.x, p2.y) < p2.r * 1.5) {
            p2.isDragging = true;
            activeP = p2;
        }
    }

    function onPointerMove(e) {
        if (!activeP) return;
        let x = e.clientX || (e.touches && e.touches[0].clientX);
        let y = e.clientY || (e.touches && e.touches[0].clientY);
        activeP.x = x;
        activeP.y = y;
    }

    function onPointerUp() {
        if(activeP) {
            activeP.isDragging = false;
            activeP = null;
        }
    }

    window.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);
    window.addEventListener('touchstart', onPointerDown, {passive: false});
    window.addEventListener('touchmove', onPointerMove, {passive: false});
    window.addEventListener('touchend', onPointerUp);

    function drawBeam(p, color, intensity, state) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        
        let beamLength = height * 1.5;
        let gradient = ctx.createLinearGradient(0, 0, beamLength, 0);
        
        if (state === STATE_PARALLEL) {
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, 'rgba(255, 200, 100, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(beamLength, Math.sin(gapAngle/2) * beamLength * 0.8);
            ctx.lineTo(beamLength, -Math.sin(gapAngle/2) * beamLength * 0.8);
            ctx.closePath();
            ctx.globalAlpha = intensity;
            ctx.fill();
        } else if (state === STATE_CLASH) {
            ctx.strokeStyle = 'rgba(255, 50, 50, 0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(beamLength * 0.2, (Math.random()-0.5)*50);
            ctx.stroke();
        } else {
            gradient.addColorStop(0, 'rgba(100, 150, 255, 0.1)');
            gradient.addColorStop(1, 'rgba(100, 150, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(beamLength * 0.3, Math.sin(gapAngle/2) * beamLength * 0.3);
            ctx.lineTo(beamLength * 0.3, -Math.sin(gapAngle/2) * beamLength * 0.3);
            ctx.closePath();
            ctx.fill();
        }
        ctx.restore();
    }

    function drawEntity(p, state, isGlitched) {
        let jitterX = 0;
        let jitterY = 0;
        let color = '#aaccff';
        let glow = 20;

        if (state === STATE_CLASH) {
            jitterX = (Math.random() - 0.5) * 15;
            jitterY = (Math.random() - 0.5) * 15;
            color = Math.random() > 0.5 ? '#ff3333' : '#550000';
            glow = 40;
        } else if (state === STATE_PARALLEL) {
            color = `rgba(255, ${180 + stateProgress * 75}, ${100 + stateProgress * 50}, 1)`;
            glow = 30 + Math.sin(Date.now() * 0.003) * 10;
        }

        ctx.save();
        ctx.translate(p.x + jitterX, p.y + jitterY);
        ctx.rotate(p.angle);
        
        ctx.shadowBlur = glow;
        ctx.shadowColor = color;
        ctx.strokeStyle = color;
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';

        ctx.beginPath();
        ctx.arc(0, 0, p.r, gapAngle / 2, Math.PI * 2 - gapAngle / 2);
        ctx.stroke();

        if (isGlitched && Math.random() > 0.8) {
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc((Math.random()-0.5)*10, (Math.random()-0.5)*10, p.r, 0, Math.PI * 2);
            ctx.stroke();
        }

        ctx.restore();
    }

    function update() {
        let dist = getDistance(p1.x, p1.y, p2.x, p2.y);
        let dy = Math.abs(p1.y - p2.y);
        
        // 判斷關係狀態
        if (dist < p1.r * 1.8) {
            currentState = STATE_CLASH;
            stateProgress = lerp(stateProgress, 1, 0.1);
        } else if (dist >= p1.r * 2 && dist < p1.r * 4.5 && dy < p1.r) {
            currentState = STATE_PARALLEL;
            stateProgress = lerp(stateProgress, 1, 0.03);
        } else {
            currentState = STATE_SEARCHING;
            stateProgress = lerp(stateProgress, 0, 0.05);
        }

        // 觸覺回饋 (震動) - 當狀態為勉強相合(碰撞)時
        if (currentState === STATE_CLASH) {
            if (previousState !== STATE_CLASH) {
                // 剛進入碰撞狀態：輕微雙重震動 (短暫有感)
                if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
                lastVibrateTime = Date.now();
            } else {
                // 持續在碰撞狀態：限制震動頻率，每300毫秒給予一次極短暫的微弱震動，避免麻木
                if (Date.now() - lastVibrateTime > 300) {
                    if (navigator.vibrate) navigator.vibrate(15);
                    lastVibrateTime = Date.now();
                }
            }
        }
        previousState = currentState;

        // 狀態對應的物理與行為
        if (currentState === STATE_SEARCHING) {
            // 互相尋找對方的缺口 (誘使用戶試圖拼合)
            p1.targetAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
            p2.targetAngle = Math.atan2(p1.y - p2.y, p1.x - p2.x);
        } else if (currentState === STATE_CLASH) {
            // 排斥與混亂
            p1.targetAngle += (Math.random() - 0.5) * 0.5;
            p2.targetAngle += (Math.random() - 0.5) * 0.5;
            
            // 彈開力量
            if (!p1.isDragging && !p2.isDragging) {
                let repelAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                p1.x -= Math.cos(repelAngle) * 2;
                p1.y -= Math.sin(repelAngle) * 2;
                p2.x += Math.cos(repelAngle) * 2;
                p2.y += Math.sin(repelAngle) * 2;
            }
        } else if (currentState === STATE_PARALLEL) {
            // 共同看向上方
            p1.targetAngle = -Math.PI / 2;
            p2.targetAngle = -Math.PI / 2;

            // 輕微的並肩引力 (但不強制黏合)
            if (!p1.isDragging && !p2.isDragging) {
                let midY = (p1.y + p2.y) / 2;
                p1.y = lerp(p1.y, midY, 0.02);
                p2.y = lerp(p2.y, midY, 0.02);
            }
        }

        p1.angle = lerpAngle(p1.angle, p1.targetAngle, 0.08);
        p2.angle = lerpAngle(p2.angle, p2.targetAngle, 0.08);

        // 繪製背景與粒子
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = `rgba(5, 5, 7, ${currentState === STATE_CLASH ? 0.3 : 0.2})`;
        ctx.fillRect(0, 0, width, height);
        
        ctx.globalCompositeOperation = 'lighter';
        
        particles.forEach(pt => {
            if (currentState === STATE_PARALLEL) {
                // 星辰升起
                pt.vy = lerp(pt.vy, -1.5 - Math.random(), 0.02);
                pt.vx = lerp(pt.vx, 0, 0.02);
                ctx.fillStyle = `rgba(255, 220, 150, ${pt.baseAlpha * stateProgress * 2})`;
            } else if (currentState === STATE_CLASH) {
                // 混亂亂竄
                pt.vy += (Math.random() - 0.5) * 2;
                pt.vx += (Math.random() - 0.5) * 2;
                ctx.fillStyle = `rgba(255, 100, 100, ${pt.baseAlpha})`;
            } else {
                // 落寞的灰燼
                pt.vy = lerp(pt.vy, Math.random() * 0.5 + 0.2, 0.05);
                pt.vx = lerp(pt.vx, (Math.random() - 0.5) * 0.5, 0.05);
                ctx.fillStyle = `rgba(150, 180, 220, ${pt.baseAlpha})`;
            }

            pt.x += pt.vx;
            pt.y += pt.vy;

            if (pt.y > height + 10) pt.y = -10;
            if (pt.y < -10) pt.y = height + 10;
            if (pt.x > width + 10) pt.x = -10;
            if (pt.x < -10) pt.x = width + 10;

            ctx.beginPath();
            ctx.arc(pt.x, pt.y, pt.size * (currentState === STATE_PARALLEL ? 1.5 : 1), 0, Math.PI * 2);
            ctx.fill();
        });

        // 繪製光束與實體
        drawBeam(p1, `rgba(255, 200, 120, ${stateProgress * 0.4})`, stateProgress, currentState);
        drawBeam(p2, `rgba(255, 200, 120, ${stateProgress * 0.4})`, stateProgress, currentState);
        
        drawEntity(p1, currentState, currentState === STATE_CLASH);
        drawEntity(p2, currentState, currentState === STATE_CLASH);

        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
