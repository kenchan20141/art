<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Illusion of Control</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f1015;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let W, H;
        const grades =["LV 1", "LV 2", "LV 3", "LV 4", "LV 5", "LV 5*", "LV 5**"];
        const binCounts =[0, 0, 0, 0, 0, 0, 0];
        const balls =[];
        const floatingTexts =[];
        
        // 互動狀態
        let isCharging = false;
        let effortLevel = 0;
        
        // 遊戲結束狀態
        let isGameOver = false;
        let finalResult = ""; 
        let gameOverAlpha = 0; 

        // 畫布自適應
        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
        }
        window.addEventListener('resize', resize);
        resize();

        // 綁定事件
        window.addEventListener('pointerdown', (e) => {
            if (isGameOver) {
                if (gameOverAlpha > 0.8) resetGame();
            } else {
                isCharging = true;
            }
        });
        
        window.addEventListener('pointerup', releaseBall);
        window.addEventListener('pointercancel', releaseBall);

        function resetGame() {
            binCounts.fill(0);
            balls.length = 0;
            floatingTexts.length = 0;
            isGameOver = false;
            effortLevel = 0;
            finalResult = "";
            gameOverAlpha = 0;
        }

        function releaseBall() {
            if (isCharging && !isGameOver) {
                balls.push(new Ball(effortLevel));
                isCharging = false;
                effortLevel = 0;
            } else {
                isCharging = false;
                effortLevel = 0;
            }
        }

        function getEffortColor(value) {
            const h = 220 - (value * 220); 
            const s = 40 + value * 60;
            const l = 50 + value * 10;
            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        const ROWS = 12;
        const COLS = 7;
        
        function getBoardMetrics() {
            const binWidth = Math.min(W * 0.9 / COLS, 55); 
            const startX = (W - binWidth * COLS) / 2 + binWidth / 2;
            const startY = H * 0.20; 
            const rowHeight = (H * 0.4) / ROWS; 
            const targetLineY = startY - rowHeight * 1.5; 
            const baseline = startY + ROWS * rowHeight + 40;

            return { binWidth, startX, startY, rowHeight, targetLineY, baseline };
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.life = 1.0;
                this.dy = -0.5 - Math.random() * 0.5;
            }
            update() {
                this.y += this.dy;
                this.life -= 0.02;
            }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.life * 0.7; 
                ctx.fillStyle = this.color;
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        class Ball {
            constructor(effort) {
                this.effort = effort;
                this.color = getEffortColor(effort);
                this.col = effort * (COLS - 1); 
                this.row = -1; 
                
                const { startX, startY, binWidth, rowHeight } = getBoardMetrics();
                
                this.x = startX + this.col * binWidth;
                this.y = startY - rowHeight * 4; 
                
                this.targetX = this.x;
                this.targetY = this.y;
                this.progress = 1;
                this.isLanded = false;
                this.history =[]; 
            }

            calculateNextStep() {
                const { startX, startY, binWidth, rowHeight, targetLineY, baseline } = getBoardMetrics();
                this.row++;
                
                if (this.row >= ROWS) {
                    this.isLanded = true;
                    let finalBin = Math.round(this.col);
                    if(finalBin < 0) finalBin = 0;
                    if(finalBin > 6) finalBin = 6;
                    
                    binCounts[finalBin]++;
                    
                    const cx = startX + finalBin * binWidth;
                    floatingTexts.push(new FloatingText(cx, baseline - 20, grades[finalBin], this.color));
                    
                    const blockHeight = 8;
                    const gap = 3;
                    const currentStackHeight = binCounts[finalBin] * (blockHeight + gap);
                    const stackTopY = baseline - currentStackHeight;

                    if (stackTopY <= targetLineY) { 
                        isGameOver = true;
                        finalResult = grades[finalBin]; 
                    }
                    return;
                }

                let bounce = (Math.random() < 0.5) ? -0.5 : 0.5;
                this.col += bounce;

                if (this.col < 0) this.col = 0.5;
                if (this.col > COLS - 1) this.col = COLS - 1.5;

                this.targetX = startX + this.col * binWidth;
                this.targetY = startY + this.row * rowHeight;
                this.progress = 0;
            }

            update() {
                if (this.isLanded) return;
                
                if (this.progress >= 1) {
                    this.calculateNextStep();
                } else {
                    this.progress += 0.08;
                    if(this.progress > 1) this.progress = 1;

                    this.x += (this.targetX - this.x) * 0.2;
                    this.y += (this.targetY - this.y) * 0.2;

                    this.history.push({x: this.x, y: this.y});
                    if (this.history.length > 10) this.history.shift();
                }
            }

            draw() {
                if (this.isLanded) return;
                
                if (this.history.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.history[0].x, this.history[0].y);
                    for (let i = 1; i < this.history.length; i++) {
                        ctx.lineTo(this.history[i].x, this.history[i].y);
                    }
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 2;
                    ctx.lineCap = 'round';
                    ctx.globalAlpha = 0.4;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function drawEnvironment() {
            const { startX, startY, binWidth, rowHeight, targetLineY, baseline } = getBoardMetrics();

            // 1. 目標線
            ctx.beginPath();
            ctx.moveTo(0, targetLineY);
            ctx.lineTo(W, targetLineY);
            ctx.strokeStyle = 'rgba(255, 60, 60, 0.6)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 2. 釘板點
            ctx.fillStyle = '#1e1f26';
            for (let r = 0; r <= ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let px = startX + c * binWidth;
                    let py = startY + r * rowHeight;
                    if (r % 2 !== 0) {
                        px += binWidth / 2;
                        if (c === COLS - 1) continue; 
                    }
                    ctx.beginPath();
                    ctx.arc(px, py, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // 3. 底部槽與結果方塊
            const blockHeight = 8;
            const gap = 3;
            
            ctx.textAlign = 'center';
            ctx.font = '12px Arial'; 

            for (let i = 0; i < COLS; i++) {
                const cx = startX + i * binWidth;
                const stackHeight = binCounts[i] * (blockHeight + gap);
                
                for (let b = 0; b < binCounts[i]; b++) {
                    const by = baseline - (b + 1) * (blockHeight + gap);
                    const distToLine = by - targetLineY;
                    let blockColor;
                    
                    if (distToLine < 50) {
                        blockColor = '#ff4444'; 
                    } else if (distToLine < 150) {
                        blockColor = '#aa5555'; 
                    } else {
                        blockColor = '#444'; 
                    }

                    ctx.fillStyle = blockColor;
                    ctx.fillRect(cx - binWidth * 0.35, by, binWidth * 0.7, blockHeight);
                }

                ctx.fillStyle = '#666';
                ctx.fillText(grades[i], cx, baseline + 25);
            }

            // 4. 無文字、位於紅線上方的蓄力條
            if (!isGameOver) {
                const barMaxWidth = 400; // 電腦端最大寬度限制
                const barWidth = Math.min(W * 0.7, barMaxWidth); // 響應式寬度：螢幕寬的 70%
                const barHeight = 6; // 蓄力條高度
                const barX = (W - barWidth) / 2; // 置中對齊
                
                // 變更高度：放在紅線(targetLineY)上方，同時與最頂部保留最少 30px 的安全距離
                const barY = Math.max(30, targetLineY - rowHeight * 1.5); 

                // 繪製蓄力條背景軌道
                ctx.beginPath();
                ctx.moveTo(barX, barY);
                ctx.lineTo(barX + barWidth, barY);
                ctx.strokeStyle = '#222'; // 暗灰色軌道
                ctx.lineWidth = barHeight;
                ctx.lineCap = 'round'; // 圓角兩端
                ctx.stroke();

                // 繪製目前蓄力進度
                if (effortLevel > 0) {
                    const currentColor = getEffortColor(effortLevel);
                    const fillWidth = barWidth * effortLevel;
                    
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(barX, barY);
                    ctx.lineTo(barX + fillWidth, barY);
                    ctx.strokeStyle = currentColor;
                    ctx.lineWidth = barHeight;
                    ctx.lineCap = 'round';
                    
                    // 加上微微的發光效果，讓高蓄力時更有張力
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = currentColor;
                    
                    ctx.stroke();
                    ctx.restore();
                }
            }
        }

        function drawResult() {
            if (!isGameOver) return;

            if (gameOverAlpha < 0.95) gameOverAlpha += 0.02;

            ctx.fillStyle = `rgba(10, 10, 12, ${gameOverAlpha})`;
            ctx.fillRect(0, 0, W, H);

            ctx.save();
            ctx.translate(W / 2, H / 2);
            ctx.globalAlpha = gameOverAlpha;
            
            const fontSize = Math.min(W, H) * 0.15; 
            ctx.font = `bold ${fontSize}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#fff';
            ctx.fillText(finalResult, 0, -20);
            
            ctx.shadowBlur = 0;

            if (gameOverAlpha > 0.8) {
                ctx.font = '14px sans-serif';
                ctx.fillStyle = '#444';
                ctx.fillText("...", 0, 80); 
            }
            
            ctx.restore();
        }

        function loop() {
            ctx.clearRect(0, 0, W, H);

            if (isCharging && !isGameOver) {
                effortLevel += 0.015;
                if (effortLevel > 1) effortLevel = 1;
            }

            drawEnvironment();

            for (let i = balls.length - 1; i >= 0; i--) {
                balls[i].update();
                balls[i].draw();
                if (balls[i].isLanded) {
                    balls.splice(i, 1);
                }
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].update();
                floatingTexts[i].draw(ctx);
                if (floatingTexts[i].life <= 0) {
                    floatingTexts.splice(i, 1);
                }
            }

            if (isGameOver) {
                drawResult();
            }

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
