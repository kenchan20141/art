<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reflections | Digital Art Museum</title>
<style>
    :root {
        --bg: #0a0a0c;
        --text-main: #f0f0f0;
        --text-muted: #666666;
        --accent: #d23838;
    }
    body {
        margin: 0;
        background-color: var(--bg);
        color: var(--text-main);
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
    }

    /* 頂部策展宣言 */
    .museum-header {
        padding: 15vh 8vw 10vh;
        max-width: 1200px;
        margin: 0 auto;
    }
    .museum-header h1 {
        font-size: clamp(3rem, 8vw, 6rem);
        font-weight: 200;
        letter-spacing: -2px;
        margin: 0 0 20px 0;
        text-transform: uppercase;
    }
    .museum-header p {
        font-size: clamp(1rem, 2vw, 1.2rem);
        color: var(--text-muted);
        max-width: 600px;
        line-height: 1.6;
        font-weight: 300;
    }

    /* 展覽列表 (響應式間距) */
    .exhibition-list {
        display: flex;
        flex-direction: column;
        gap: 6vh; /* 手機版縮小間距，依靠 border 區隔 */
        padding: 0 6vw 15vh;
        max-width: 1400px;
        margin: 0 auto;
    }

    /* 單個展品區塊 (手機版預設：文字在上，預覽在下) */
    .exhibit-item {
        display: flex;
        flex-direction: column; 
        gap: 25px;
        cursor: pointer;
        padding-bottom: 8vh;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
    }
    .exhibit-item:last-child {
        border-bottom: none;
        padding-bottom: 0;
    }

    /* 展品資訊 */
    .exhibit-info {
        flex: 1;
        display: flex;
        flex-direction: column;
    }
    .exhibit-num {
        font-size: 0.9rem;
        color: var(--accent);
        letter-spacing: 2px;
        margin-bottom: 10px;
        font-weight: bold;
    }
    .exhibit-title {
        font-size: clamp(2rem, 4vw, 3.5rem);
        margin: 0 0 15px 0;
        font-weight: 400;
        transition: color 0.3s;
    }
    .exhibit-desc {
        color: var(--text-muted);
        font-size: 1.1rem;
        max-width: 400px;
    }
    .exhibit-item:hover .exhibit-title { color: var(--accent); }

    /* 預覽視窗 (純 CSS 繪製的意境預覽) */
    .preview-container {
        flex: 1;
        width: 100%;
        aspect-ratio: 16 / 10;
        background: #141417;
        position: relative;
        overflow: hidden;
        transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .preview-container::after {
        content: ''; position: absolute; inset: 0;
        border: 1px solid rgba(255,255,255,0.1);
        transition: border-color 0.4s;
    }
    .exhibit-item:hover .preview-container { transform: scale(1.02); }
    .exhibit-item:hover .preview-container::after { border-color: rgba(255,255,255,0.5); }

    /* 電腦版：奇偶數交錯排列，營造高級感 */
    @media (min-width: 768px) {
        .exhibition-list {
            gap: 15vh; 
            padding: 0 8vw 20vh;
        }
        .exhibit-item { 
            flex-direction: row-reverse; 
            align-items: center; 
            gap: 6vw; 
            padding-bottom: 0;
            border-bottom: none;
        }
        .exhibit-item:nth-child(even) { 
            flex-direction: row; 
        }
        
        .exhibit-item:nth-child(odd) .preview-container { transform: translateX(-2vw); }
        .exhibit-item:nth-child(even) .preview-container { transform: translateX(2vw); }

        .exhibit-item:nth-child(odd):hover .preview-container { transform: translateX(-2vw) scale(1.02); }
        .exhibit-item:nth-child(even):hover .preview-container { transform: translateX(2vw) scale(1.02); }
    }

   /* ================= 預覽圖的 CSS 藝術 ================= */
    
    /* ART 1 預覽：混亂的點 */
    .preview-art1 { position: absolute; inset: 0; display: flex; flex-wrap: wrap; gap: 4px; padding: 20px; align-content: center; justify-content: center; opacity: 0.5; }
    .preview-art1 div { width: 10px; height: 10px; background: #fff; }
    @keyframes chaosMove1 { 0%, 100% { transform: translate(0, 0) rotate(0deg); background: #fff; } 50% { transform: translate(20px, -15px) rotate(45deg); background: var(--accent); } }
    @keyframes chaosMove2 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-10px, 20px) scale(1.5); } }
    .preview-art1 div:nth-child(2n) { animation: chaosMove1 4s ease-in-out infinite; }
    .preview-art1 div:nth-child(3n) { animation: chaosMove2 5s ease-in-out infinite; }

    /* ART 2 預覽：結構與掉落 */
    .preview-art2 { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0.5; }
    .art2-frame { width: 100px; height: 120px; border: 2px dashed #00d2ff; position: relative; }
    .art2-block { width: 20px; height: 10px; background: var(--accent); position: absolute; left: 40px; animation: autoDrop 3.5s cubic-bezier(0.34, 1.56, 0.64, 1) infinite; }
    @keyframes autoDrop { 0%, 10% { top: -40px; opacity: 1; } 35%, 75% { top: 90px; opacity: 1; } 90%, 100% { top: 150px; opacity: 0; } }

    /* ART 3 預覽：徒勞的完美 */
    .preview-art3 { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 40px; align-content: center; justify-content: center; opacity: 0.6; }
    .preview-art3 .p-dot { width: 12px; height: 12px; background: #fff; border-radius: 50%; margin: auto; transition: all 0.3s; }
    @keyframes hydra1 { 0%, 15%, 100% { background: #fff; transform: scale(1); box-shadow: none; } 2%, 12% { background: var(--accent); transform: scale(0.7) translate(3px, -3px); box-shadow: 0 0 8px var(--accent); } }
    @keyframes hydra2 { 0%, 15%, 35%, 100% { background: #fff; transform: scale(1); box-shadow: none; border-radius: 50%; } 17%, 32% { background: var(--accent); transform: scale(0.8) translate(-4px, 2px); box-shadow: 0 0 8px var(--accent); border-radius: 4px; } }
    @keyframes hydra3 { 0%, 35%, 60%, 100% { background: #fff; transform: scale(1) rotate(0deg); box-shadow: none; border-radius: 50%; } 37%, 55% { background: var(--accent); transform: scale(1.3) rotate(45deg); box-shadow: 0 0 10px var(--accent); border-radius: 2px; } }
    .preview-art3 .p-dot:nth-child(6) { animation: hydra1 5s infinite; } .preview-art3 .p-dot:nth-child(2), .preview-art3 .p-dot:nth-child(11) { animation: hydra2 5s infinite; } .preview-art3 .p-dot:nth-child(1), .preview-art3 .p-dot:nth-child(8), .preview-art3 .p-dot:nth-child(15), .preview-art3 .p-dot:nth-child(16) { animation: hydra3 5s infinite; }

    /* ART 4 預覽：算計與詩篇 */
    .preview-art4 { position: absolute; inset: 0; background: #050505; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .art4-poem { writing-mode: vertical-rl; color: #555; font-family: serif; letter-spacing: 2px; z-index: 1; }
    .art4-math { position: absolute; color: #00ff88; font-family: monospace; font-weight: bold; opacity: 0; animation: mathFlash 6s infinite; z-index: 2; }
    .art4-math:nth-child(2) { top: 20%; left: 30%; animation-delay: 0.5s; } .art4-math:nth-child(3) { top: 60%; left: 70%; animation-delay: 1.2s; } .art4-math:nth-child(4) { top: 30%; left: 60%; animation-delay: 2.1s; }
    .art4-ring { position: absolute; width: 20px; height: 20px; border: 2px solid #e8d08b; border-radius: 50%; opacity: 0; z-index: 0; animation: patienceBloom 6s infinite; }
    @keyframes mathFlash { 0%, 60%, 100% { opacity: 0; transform: scale(0.8); } 10%, 50% { opacity: 0.8; transform: scale(1.2); } }
    @keyframes patienceBloom { 0%, 50% { transform: scale(1); opacity: 0; } 60% { transform: scale(5); opacity: 0.5; } 80%, 100% { transform: scale(15); opacity: 0; } }

    /* ART 5 預覽：內化與消耗 (自動演示 ABSORB 與 APPLY 模式切換) */
    .preview-art5 { position: absolute; inset: 0; background: #030308; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .art5-core { width: 24px; height: 24px; z-index: 10; animation: art5CoreSwitch 8s infinite cubic-bezier(0.25, 1, 0.5, 1); }
    .art5-aura { position: absolute; border: 1px solid rgba(16, 185, 129, 0.6); border-radius: 50%; animation: art5AbsorbAura 8s infinite; }
    .art5-laser { position: absolute; width: 100px; height: 2px; background: #ef4444; opacity: 0; animation: art5ApplyLaser 8s infinite; transform-origin: left center; margin-left: 20px;}
    .art5-laser:nth-child(3) { transform: rotate(0deg); }
    .art5-laser:nth-child(4) { transform: rotate(90deg); }
    .art5-laser:nth-child(5) { transform: rotate(180deg); }
    .art5-laser:nth-child(6) { transform: rotate(270deg); }

    @keyframes art5CoreSwitch {
        /* ABSORB 模式: 圓潤、溫柔發光 */
        0%, 45% { background: #fff; border-radius: 50%; box-shadow: 0 0 20px #10b981, 0 0 40px #8b5cf6; transform: rotate(0deg) scale(1); border: none; }
        /* APPLY 模式: 銳利、紅色機械化 */
        50%, 95% { background: transparent; border-radius: 0%; box-shadow: inset 0 0 10px #ef4444, 0 0 15px #ef4444; transform: rotate(45deg) scale(1.2); border: 2px solid #ef4444; }
        100% { background: #fff; border-radius: 50%; box-shadow: 0 0 20px #10b981; transform: rotate(90deg) scale(1); border: none; }
    }
    @keyframes art5AbsorbAura {
        0% { width: 24px; height: 24px; opacity: 1; }
        35% { width: 200px; height: 200px; opacity: 0; }
        40%, 100% { width: 24px; height: 24px; opacity: 0; }
    }
    @keyframes art5ApplyLaser {
        0%, 49% { opacity: 0; transform: scaleX(0); }
        55%, 85% { opacity: 0.8; transform: scaleX(1); }
        95%, 100% { opacity: 0; transform: scaleX(0); }
    }


/* ART 6 預覽：過程與灰燼 (急躁墜落 vs 緩慢綻放) */
    .preview-art6 { position: absolute; inset: 0; background: #050508; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    
    /* 慢下來的過程：發光、變色與綻放 */
    .art6-slow { position: absolute; left: 35%; width: 12px; height: 12px; border-radius: 50%; animation: art6SlowJourney 6s infinite ease-in-out; z-index: 2; }
    .art6-slow::after { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border-radius: 50%; border: 2px solid; animation: art6Bloom 6s infinite ease-out; }
    
    /* 急功近利的結果：枯燥、脆弱、碎裂墜落 */
    .art6-fast-container { position: absolute; right: 25%; top: 30%; width: 50px; height: 100px; }
    .art6-fast { position: absolute; width: 30px; height: 2px; background: #555; animation: art6ShatterDrop 2.5s infinite cubic-bezier(0.5, 0, 1, 1); }
    .art6-fast:nth-child(2) { top: 15px; width: 20px; animation-delay: 0.3s; }
    .art6-fast:nth-child(3) { top: 30px; width: 40px; animation-delay: 0.7s; }

    @keyframes art6SlowJourney {
        0% { transform: translateY(25px); background: hsl(0, 80%, 60%); box-shadow: 0 0 20px hsl(0, 80%, 60%); color: hsl(0, 80%, 60%); }
        50% { transform: translateY(-25px); background: hsl(180, 80%, 60%); box-shadow: 0 0 20px hsl(180, 80%, 60%); color: hsl(180, 80%, 60%); }
        100% { transform: translateY(25px); background: hsl(360, 80%, 60%); box-shadow: 0 0 20px hsl(360, 80%, 60%); color: hsl(360, 80%, 60%); }
    }
    @keyframes art6Bloom {
        0%, 30% { transform: scale(0.5); opacity: 0; }
        50% { transform: scale(2.5); opacity: 0.8; }
        100% { transform: scale(5); opacity: 0; }
    }
    @keyframes art6ShatterDrop {
        0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
        15% { transform: translate(5px, 5px) rotate(15deg); opacity: 1; }
        35% { transform: translate(15px, 30px) rotate(45deg); opacity: 0.5; }
        100% { transform: translate(20px, 120px) rotate(90deg); opacity: 0; }
    }


    /* ================= 獨立展品全螢幕播放器 ================= */
    .viewer {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: #000; z-index: 1000;
        opacity: 0; pointer-events: none;
        transition: opacity 0.6s ease;
        display: flex;
        flex-direction: column;
    }
    .viewer.active { opacity: 1; pointer-events: auto; }

    .ui-top-bar {
        width: 100%; padding: 20px 40px; box-sizing: border-box;
        display: flex; justify-content: space-between; align-items: center;
        background: var(--bg); border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
        z-index: 1010;
    }
    
    .ui-btn {
        background: none; border: none; color: #fff;
        font-size: 0.9rem; letter-spacing: 2px; cursor: pointer;
        opacity: 0.5; transition: opacity 0.3s, transform 0.3s;
        text-transform: uppercase;
    }
    .ui-btn:hover { opacity: 1; transform: translateY(-2px); }

    .viewer-content { flex: 1; position: relative; width: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; display: block; }

    .analysis-panel {
        position: absolute; bottom: 40px; right: 40px;
        width: 350px; background: rgba(255, 255, 255, 0.95); color: #000;
        padding: 30px; border-radius: 2px;
        opacity: 0; transform: translateY(20px); pointer-events: none;
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1005;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .analysis-panel.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .analysis-panel h3 { margin: 0 0 15px 0; font-size: 1.2rem; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
    .analysis-panel p { margin: 0; font-size: 0.95rem; line-height: 1.7; color: #333; text-align: justify; }

    @media (max-width: 768px) {
        .ui-top-bar { padding: 15px 20px; }
        .analysis-panel { width: 85vw; right: 50%; transform: translate(50%, 20px); bottom: 20px; }
        .analysis-panel.show { transform: translate(50%, 0); }
    }
</style>
</head>
<body>

<header class="museum-header">
    <h1>Reflections</h1>
    <p>一個關於生活反思與學習認知的數位藝術展覽。</p>
</header>

<main class="exhibition-list" id="gallery">
    <!-- 這裡將透過 JS 自動生成展品列表 -->
</main>

<!-- 全螢幕展區 -->
<div class="viewer" id="viewer">
    <div class="ui-top-bar">
        <button class="ui-btn" id="btn-info">[ 賞析 Read ]</button>
        <button class="ui-btn" id="btn-close">[ 離開 Exit ]</button>
    </div>

    <div class="viewer-content">
        <iframe id="art-frame"></iframe>
        
        <div class="analysis-panel" id="analysis-panel">
            <h3 id="analysis-title"></h3>
            <p id="analysis-text"></p>
        </div>
    </div>
</div>

<script>
    const exhibits = [
    {
        id: 1,
        url: "art1.html",
        num: "NO. 01",
        title: "失焦矩陣",
        subtitle: "社交媒體與注意力的瓦解",
        previewHTML: `<div class="preview-art1">${'<div></div>'.repeat(30)}</div>`,
        analysis: "這件互動裝置具象化了數位時代的專注力危機。游標的每一次移動與點擊，都如同我們在社交媒體上的無心滑動，看似微不足道，卻不斷累積著混亂的變數。當外在的刺激超過臨界點，原本整齊的認知矩陣將徹底崩解。作品靜靜拋出一個提問：在碎片化資訊的洪流中，我們該如何守護內在的秩序。"
    },
    {
        id: 2,
        url: "art2.html",
        num: "NO. 02",
        title: "重構與歸類",
        subtitle: "從碎片堆疊到框架思考",
        previewHTML: `<div class="preview-art2"><div class="art2-frame"><div class="art2-block"></div></div></div>`,
        analysis: "學習的過程往往面臨兩種截然不同的路徑。盲目堆積零散的細節，如同在沒有地基的狀態下築起高塔，隨時可能因微小的失衡而全面崩潰。相反地，建立宏觀的框架，則是先為知識劃定清晰的網格，讓繁雜的碎片能夠精準歸位。這組對比裝置揭示了系統化思考的價值：唯有先看見整體的輪廓，局部的細節才能找到安放的座標。"
    },
    {
        id: 3,
        url: "art3.html", 
        num: "NO. 03",
        title: "徒勞的完美",
        subtitle: "完美主義的無盡迴圈與崩潰",
        previewHTML: `<div class="preview-art3">${'<div class="p-dot"></div>'.repeat(16)}</div>`,
        analysis: "這件互動裝置精準地諷刺了學生在學習過程中對「完美」的過度執著。畫布上微小的瑕疵總誘使我們去修正，但如同現實中的「打地鼠」，過度苛求細節的代價，往往是引發更多預料之外的混亂。當修復的動作本身成為破壞整體結構的根源，作品揭示了一個殘酷的悖論：無止盡的完美主義，終究是一場徒勞無功的自我消耗。有時候，接受適度的不完美，才是維持系統運作的正解。"
    },
    {
        id: 4,
        url: "art4.html",
        num: "NO. 04",
        title: "算計與詩篇",
        subtitle: "即時成就感與延遲的靈魂",
        previewHTML: `
            <div class="preview-art4">
                <div class="art4-poem">用數字填滿留白，連靈魂也無法閱讀。</div>
                <div class="art4-math">+100</div>
                <div class="art4-math">8923</div>
                <div class="art4-math">MAX</div>
                <div class="art4-ring"></div>
            </div>`,
        analysis: "這件作品諷刺了當代學生過度追求量化成績與「即時滿足」的現象。畫面上不斷彈出的數字，象徵著算計與速成的成就感，你可以輕易透過點擊與滑動獲得分數；但代價是，代表內在涵養的文學詩篇會逐漸被亂碼吞噬。語文的學習沒有捷徑，它需要「延遲滿足」——唯有當你克制住追逐分數的衝動，在空白處耐心長按停留，拒絕干擾，文字真正的意義與美麗才會向你顯現。"
    },
    {
        id: 5,
        url: "art5.html",
        num: "NO. 05",
        title: "Absorb？Apply？",
        subtitle: "無用之用",
        previewHTML: `
            <div class="preview-art5">
                <div class="art5-aura"></div>
                <div class="art5-laser"></div>
                <div class="art5-laser"></div>
                <div class="art5-laser"></div>
                <div class="art5-laser"></div>
                <div class="art5-core"></div>
            </div>`,
        analysis: "這件互動裝置以浩瀚宇宙為隱喻，演繹了我們面對深層知識時兩種截然不同的態度。作品揭示了學習的真相：無用的知識往往才是滋養靈魂的深邃養分，而過度追求即時變現的學習，終將導致精神世界的貧瘠與荒蕪。"
    }, // <-- 記得這裡要加逗號
    {
        id: 6,
        url: "art6.html",
        num: "NO. 06",
        title: "軌跡與灰燼",
        subtitle: "急躁的代價與慢活的詩意",
        previewHTML: `
            <div class="preview-art6">
                <!-- 慢下來的絢麗軌跡 -->
                <div class="art6-slow"></div>
                <!-- 急功近利的碎裂灰燼 -->
                <div class="art6-fast-container">
                    <div class="art6-fast"></div>
                    <div class="art6-fast"></div>
                    <div class="art6-fast"></div>
                </div>
            </div>`,
        analysis: "這件互動裝置具象化了現代人急功近利的焦慮。當你急於求成、在畫布上快速拖曳時，留下的只有枯燥、脆弱且註定碎裂墜落的灰色線條；而當你願意慢下來，沉穩地感受當下的軌跡，畫面便會隨著時間流轉，綻放出絢麗的光彩與生命力。作品溫柔地提醒我們：唯有學會欣賞過程的緩慢，生活才會向我們展露它真實的美麗；急躁求來的結果，終究只是沒有根基、轉瞬即逝的灰燼。"
    }
];

    const gallery = document.getElementById('gallery');
    const viewer = document.getElementById('viewer');
    const artFrame = document.getElementById('art-frame');
    const analysisPanel = document.getElementById('analysis-panel');
    const analysisTitle = document.getElementById('analysis-title');
    const analysisText = document.getElementById('analysis-text');

    // 自動渲染展廳列表
    exhibits.forEach(ex => {
        const article = document.createElement('article');
        article.className = 'exhibit-item';
        article.innerHTML = `
            <div class="exhibit-info">
                <div class="exhibit-num">${ex.num}</div>
                <h2 class="exhibit-title">${ex.title}</h2>
                <div class="exhibit-desc">${ex.subtitle}</div>
            </div>
            <div class="preview-container">
                ${ex.previewHTML}
            </div>
        `;
        
        // 點擊進入展品
        article.addEventListener('click', () => {
            artFrame.src = ex.url;
            analysisTitle.innerText = ex.title;
            analysisText.innerText = ex.analysis;
            viewer.classList.add('active');
            analysisPanel.classList.remove('show');
        });
        gallery.appendChild(article);
    });

    // 關閉展品
    document.getElementById('btn-close').addEventListener('click', () => {
        viewer.classList.remove('active');
        analysisPanel.classList.remove('show');
        setTimeout(() => { artFrame.src = ""; }, 600);
    });

    // 切換賞析
    document.getElementById('btn-info').addEventListener('click', () => {
        analysisPanel.classList.toggle('show');
    });
</script>
</body>
</html>
