<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reflections | Digital Art Museum</title>

<!-- Fonts: Editorial Serif & Tech Sans -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">

<!-- GSAP & Lenis for Smooth Scroll & Auto ScrollTo -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

<style>
    :root {
        --bg: #030305;
        --text-main: #f4f4f5;
        --text-muted: #888890;
        --accent: #d23838;
        --accent-glow: rgba(210, 56, 56, 0.4);
        --glass-bg: rgba(10, 10, 12, 0.65);
        --glass-border: rgba(255, 255, 255, 0.08);
        
        --font-serif: 'Cormorant Garamond', serif;
        --font-sans: 'Space Grotesk', sans-serif;
    }

    /* === Reset & Base === */
    * { box-sizing: border-box; }
    body, html {
        margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main);
        font-family: var(--font-sans); overflow-x: hidden; -webkit-font-smoothing: antialiased;
    }
    
    /* Film Grain Noise */
    .noise-overlay {
        position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* === Header (Editorial) === */
    .museum-header {
        height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
        text-align: center; position: relative; z-index: 10;
    }
    .museum-header h1 {
        font-family: var(--font-serif); font-size: clamp(3.5rem, 10vw, 8rem); font-weight: 300;
        margin: 0; line-height: 0.9; letter-spacing: -2px; text-transform: uppercase;
        background: linear-gradient(to bottom, #fff, #555); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .museum-header p {
        font-size: clamp(1rem, 1.5vw, 1.2rem); color: var(--text-muted); max-width: 500px;
        margin-top: 30px; font-weight: 300; letter-spacing: 1px; padding: 0 20px;
    }
    .scroll-indicator {
        position: absolute; bottom: 8vh; font-size: 0.8rem; letter-spacing: 4px; color: var(--text-muted);
        text-transform: uppercase; animation: float 2s infinite ease-in-out; pointer-events: none;
    }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }

    /* === Exhibition List (Desktop Default) === */
    .exhibition-list {
        display: flex; flex-direction: column; gap: 20vh; padding: 10vh 5vw 25vh;
        max-width: 1400px; margin: 0 auto; position: relative;
    }
    /* Spotlight / Dimming effect */
    .exhibition-list:has(.exhibit-item:hover) .exhibit-item:not(:hover) { opacity: 0.3; filter: grayscale(80%); }

    .exhibit-item {
        position: relative; display: flex; align-items: center; width: 100%; min-height: 60vh;
        transition: opacity 0.6s ease, filter 0.6s ease;
        transform-style: preserve-3d; opacity: 0; transform: translateY(80px); cursor: pointer;
    }
    .exhibit-item:nth-child(even) { justify-content: flex-end; }
    
    /* Massive Background Number */
    .exhibit-bg-num {
        position: absolute; font-family: var(--font-serif); font-size: clamp(8rem, 20vw, 25rem);
        font-weight: 600; color: rgba(255,255,255,0.02); z-index: 0; line-height: 1;
        top: 50%; transform: translateY(-50%); pointer-events: none; transition: color 0.5s;
    }
    .exhibit-item:nth-child(odd) .exhibit-bg-num { left: -5vw; }
    .exhibit-item:nth-child(even) .exhibit-bg-num { right: -5vw; }
    .exhibit-item:hover .exhibit-bg-num { color: rgba(210, 56, 56, 0.06); }

    .exhibit-content-wrapper {
        display: flex; flex-direction: row; align-items: center; gap: 6vw; z-index: 2; width: 100%; 
        transform: perspective(1000px); will-change: transform;
    }
    .exhibit-item:nth-child(even) .exhibit-content-wrapper { flex-direction: row-reverse; }

    /* 3D Frame & Preview - 強化邊界清晰度 */
    .preview-container {
        flex: 1.5; width: 100%; aspect-ratio: 16 / 10; background: #0a0a0c; position: relative; overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.15); 
        background-color: #050508;
        border-radius: 4px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    /* 沿用初代設計的精緻內邊框 */
    .preview-container::after { 
        content: ''; position: absolute; inset: 0; 
        border: 1px solid rgba(255,255,255,0.1); 
        transition: border-color 0.4s; 
        pointer-events: none;
    }
    .exhibit-item:hover .preview-container { 
        border-color: rgba(255,255,255,0.4); 
        box-shadow: 0 30px 60px rgba(210,56,56,0.15); 
        transform: scale(1.02); 
    }
    .exhibit-item:hover .preview-container::after { 
        border-color: rgba(255,255,255,0.5); 
    }
    
    /* Text Info */
    .exhibit-info { flex: 1; pointer-events: none; }
    .exhibit-num { font-size: 1rem; color: var(--accent); letter-spacing: 4px; margin-bottom: 15px; font-weight: 600; }
    .exhibit-title { font-family: var(--font-serif); font-size: clamp(2rem, 4vw, 4rem); margin: 0 0 20px 0; font-weight: 300; line-height: 1.1; font-style: italic; }
    .exhibit-desc { color: var(--text-muted); font-size: 1.1rem; max-width: 400px; line-height: 1.6; font-weight: 300; }


    /* ================= 手機版 (Mobile) ================= */
    @media (max-width: 768px) {
        .exhibition-list { gap: 12vh; padding: 5vh 5vw 20vh; }
        .exhibit-item { min-height: auto; align-items: stretch; }
        .exhibit-content-wrapper { flex-direction: column !important; position: relative; gap: 0; }
        
        .preview-container { 
            aspect-ratio: 4 / 5; border-radius: 8px; width: 100%; flex: none;
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        
        /* 文字懸浮卡片 */
        .exhibit-info {
            position: absolute; bottom: -30px; left: 5%; width: 90%;
            background: rgba(12, 12, 15, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 25px; border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.2); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); z-index: 10;
        }
        .exhibit-num { margin-bottom: 10px; font-size: 0.85rem; }
        .exhibit-title { font-size: 2.2rem; margin-bottom: 10px; }
        .exhibit-desc { font-size: 0.95rem; line-height: 1.5; color: #aaa; }
        .exhibit-info::after {
            content: 'TAP TO EXPLORE →'; display: block; margin-top: 15px;
            font-size: 0.75rem; letter-spacing: 2px; color: var(--accent); font-weight: 600;
        }

        .exhibit-bg-num {
            font-size: 40vw; top: -5%; right: 0; left: auto !important; transform: none;
            color: transparent !important; -webkit-text-stroke: 1px rgba(255,255,255,0.15);
            z-index: 5;
        }
        
        .exhibition-list:has(.exhibit-item:hover) .exhibit-item:not(:hover) { opacity: 1; filter: none; }
        .exhibit-item:hover .preview-container { transform: none; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
    }


    /* === Glassmorphic Navigation Deck === */
    .nav-deck-container {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border); border-radius: 100px;
        padding: 15px 30px; z-index: 900; display: flex; gap: 40px; align-items: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.8); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
    }
    .nav-deck-container.nav-hidden { transform: translate(-50%, 150%); opacity: 0; pointer-events: none; }

    .nav-status { font-family: var(--font-sans); color: var(--text-muted); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
    .nav-current-page { color: #fff; font-weight: 600; }

    .nav-track { display: flex; gap: 10px; align-items: center; }
    .nav-node {
        width: 40px; height: 3px; background: rgba(255,255,255,0.2); position: relative;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer;
    }
    .nav-node::after { content: ''; position: absolute; top: -15px; bottom: -15px; left: -5px; right: -5px; }
    .nav-node:hover { background: #fff; height: 5px; transform: scale(1.1); }
    .nav-node.active { background: var(--accent); height: 5px; box-shadow: 0 0 15px var(--accent-glow); width: 60px; }

    @media (max-width: 768px) {
        .nav-deck-container { bottom: 20px; width: 90%; flex-direction: column; gap: 15px; border-radius: 20px; padding: 20px; }
        .nav-node { width: 30px; } .nav-node.active { width: 40px; }
    }

    /* ================= 播放器 UI (獨立空間防重疊 ＋ 深色高級賞析面板) ================= */
    .viewer {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: #000; z-index: 2000; 
        opacity: 0; pointer-events: none;
        transition: opacity 0.6s ease;
        display: flex; flex-direction: column; /* 上下切割避免重疊 */
    }
    .viewer.active { opacity: 1; pointer-events: auto; }

    .ui-top-bar {
        width: 100%; padding: 20px 40px; box-sizing: border-box;
        display: flex; justify-content: space-between; align-items: center;
        background: #0a0a0c; border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
        z-index: 1010;
        position: relative; 
    }
    .ui-btn {
        background: none; border: none; color: #fff; font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; opacity: 0.5; transition: opacity 0.3s, transform 0.3s; text-transform: uppercase;
        font-family: var(--font-sans);
    }
    .ui-btn:hover { opacity: 1; transform: translateY(-2px); }
    
    .viewer-content { flex: 1; position: relative; width: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; display: block; }

    /* 深色高級毛玻璃賞析面板 */
    .analysis-panel {
        position: absolute; bottom: 50px; right: 5vw; width: 420px; max-height: 70vh; overflow-y: auto;
        background: rgba(15, 15, 18, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
        border: 1px solid var(--glass-border); border-radius: 12px; padding: 40px;
        opacity: 0; transform: translateY(40px) scale(0.95); pointer-events: none;
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 30px 60px rgba(0,0,0,0.8); z-index: 2005;
    }
    
    .analysis-panel::-webkit-scrollbar { width: 4px; }
    .analysis-panel::-webkit-scrollbar-track { background: transparent; }
    .analysis-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

    .analysis-panel.show { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    
    /* 紅色斜體優雅標題 */
    .analysis-panel h3 { 
        font-family: var(--font-serif); font-size: 2rem; margin: 0 0 20px 0; 
        font-weight: 300; font-style: italic; color: var(--accent); 
    }
    /* 灰色清晰內文 */
    .analysis-panel p { 
        margin: 0; font-size: 0.95rem; line-height: 1.8; color: #ccc; 
        text-align: justify; font-family: var(--font-sans); font-weight: 300; 
    }
    
    @media (max-width: 768px) {
        .ui-top-bar { padding: 15px 20px; }
        .analysis-panel { 
            width: 90vw; 
            right: 5vw; 
            bottom: 30px; 
            padding: 30px;
            max-height: 60vh;
        }
    }

    /* ================= 原生預覽圖純 CSS 藝術 (維持原樣) ================= */
    .preview-art1 { position: absolute; inset: 0; display: flex; flex-wrap: wrap; gap: 4px; padding: 20px; align-content: center; justify-content: center; opacity: 0.5; }
    .preview-art1 div { width: 10px; height: 10px; background: #fff; }
    @keyframes chaosMove1 { 0%, 100% { transform: translate(0, 0) rotate(0deg); background: #fff; } 50% { transform: translate(20px, -15px) rotate(45deg); background: var(--accent); } }
    @keyframes chaosMove2 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-10px, 20px) scale(1.5); } }
    .preview-art1 div:nth-child(2n) { animation: chaosMove1 4s ease-in-out infinite; }
    .preview-art1 div:nth-child(3n) { animation: chaosMove2 5s ease-in-out infinite; }

    .preview-art2 { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0.5; }
    .art2-frame { width: 100px; height: 120px; border: 2px dashed #00d2ff; position: relative; }
    .art2-block { width: 20px; height: 10px; background: var(--accent); position: absolute; left: 40px; animation: autoDrop 3.5s cubic-bezier(0.34, 1.56, 0.64, 1) infinite; }
    @keyframes autoDrop { 0%, 10% { top: -40px; opacity: 1; } 35%, 75% { top: 90px; opacity: 1; } 90%, 100% { top: 150px; opacity: 0; } }

    .preview-art3 { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 40px; align-content: center; justify-content: center; opacity: 0.6; }
    .preview-art3 .p-dot { width: 12px; height: 12px; background: #fff; border-radius: 50%; margin: auto; transition: all 0.3s; }
    @keyframes hydra1 { 0%, 15%, 100% { background: #fff; transform: scale(1); box-shadow: none; } 2%, 12% { background: var(--accent); transform: scale(0.7) translate(3px, -3px); box-shadow: 0 0 8px var(--accent); } }
    @keyframes hydra2 { 0%, 15%, 35%, 100% { background: #fff; transform: scale(1); box-shadow: none; border-radius: 50%; } 17%, 32% { background: var(--accent); transform: scale(0.8) translate(-4px, 2px); box-shadow: 0 0 8px var(--accent); border-radius: 4px; } }
    @keyframes hydra3 { 0%, 35%, 60%, 100% { background: #fff; transform: scale(1) rotate(0deg); box-shadow: none; border-radius: 50%; } 37%, 55% { background: var(--accent); transform: scale(1.3) rotate(45deg); box-shadow: 0 0 10px var(--accent); border-radius: 2px; } }
    .preview-art3 .p-dot:nth-child(6) { animation: hydra1 5s infinite; } .preview-art3 .p-dot:nth-child(2), .preview-art3 .p-dot:nth-child(11) { animation: hydra2 5s infinite; } .preview-art3 .p-dot:nth-child(1), .preview-art3 .p-dot:nth-child(8), .preview-art3 .p-dot:nth-child(15), .preview-art3 .p-dot:nth-child(16) { animation: hydra3 5s infinite; }

    .preview-art4 { position: absolute; inset: 0; background: #050505; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .art4-poem { writing-mode: vertical-rl; color: #555; font-family: serif; letter-spacing: 2px; z-index: 1; }
    .art4-math { position: absolute; color: #00ff88; font-family: monospace; font-weight: bold; opacity: 0; animation: mathFlash 6s infinite; z-index: 2; }
    .art4-math:nth-child(2) { top: 20%; left: 30%; animation-delay: 0.5s; } .art4-math:nth-child(3) { top: 60%; left: 70%; animation-delay: 1.2s; } .art4-math:nth-child(4) { top: 30%; left: 60%; animation-delay: 2.1s; }
    .art4-ring { position: absolute; width: 20px; height: 20px; border: 2px solid #e8d08b; border-radius: 50%; opacity: 0; z-index: 0; animation: patienceBloom 6s infinite; }
    @keyframes mathFlash { 0%, 60%, 100% { opacity: 0; transform: scale(0.8); } 10%, 50% { opacity: 0.8; transform: scale(1.2); } }
    @keyframes patienceBloom { 0%, 50% { transform: scale(1); opacity: 0; } 60% { transform: scale(5); opacity: 0.5; } 80%, 100% { transform: scale(15); opacity: 0; } }

    .preview-art5 { position: absolute; inset: 0; background: #030308; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .art5-core { width: 24px; height: 24px; z-index: 10; animation: art5CoreSwitch 8s infinite cubic-bezier(0.25, 1, 0.5, 1); }
    .art5-aura { position: absolute; border: 1px solid rgba(16, 185, 129, 0.6); border-radius: 50%; animation: art5AbsorbAura 8s infinite; }
    .art5-laser { position: absolute; width: 100px; height: 2px; background: #ef4444; opacity: 0; animation: art5ApplyLaser 8s infinite; transform-origin: left center; margin-left: 20px;}
    .art5-laser:nth-child(3) { transform: rotate(0deg); } .art5-laser:nth-child(4) { transform: rotate(90deg); } .art5-laser:nth-child(5) { transform: rotate(180deg); } .art5-laser:nth-child(6) { transform: rotate(270deg); }
    @keyframes art5CoreSwitch { 0%, 45% { background: #fff; border-radius: 50%; box-shadow: 0 0 20px #10b981, 0 0 40px #8b5cf6; transform: rotate(0deg) scale(1); border: none; } 50%, 95% { background: transparent; border-radius: 0%; box-shadow: inset 0 0 10px #ef4444, 0 0 15px #ef4444; transform: rotate(45deg) scale(1.2); border: 2px solid #ef4444; } 100% { background: #fff; border-radius: 50%; box-shadow: 0 0 20px #10b981; transform: rotate(90deg) scale(1); border: none; } }
    @keyframes art5AbsorbAura { 0% { width: 24px; height: 24px; opacity: 1; } 35% { width: 200px; height: 200px; opacity: 0; } 40%, 100% { width: 24px; height: 24px; opacity: 0; } }
    @keyframes art5ApplyLaser { 0%, 49% { opacity: 0; transform: scaleX(0); } 55%, 85% { opacity: 0.8; transform: scaleX(1); } 95%, 100% { opacity: 0; transform: scaleX(0); } }

    .preview-art6 { position: absolute; inset: 0; background: #050508; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .art6-slow { position: absolute; left: 35%; width: 12px; height: 12px; border-radius: 50%; animation: art6SlowJourney 6s infinite ease-in-out; z-index: 2; }
    .art6-slow::after { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border-radius: 50%; border: 2px solid; animation: art6Bloom 6s infinite ease-out; }
    .art6-fast-container { position: absolute; right: 25%; top: 30%; width: 50px; height: 100px; }
    .art6-fast { position: absolute; width: 30px; height: 2px; background: #555; animation: art6ShatterDrop 2.5s infinite cubic-bezier(0.5, 0, 1, 1); }
    .art6-fast:nth-child(2) { top: 15px; width: 20px; animation-delay: 0.3s; } .art6-fast:nth-child(3) { top: 30px; width: 40px; animation-delay: 0.7s; }
    @keyframes art6SlowJourney { 0% { transform: translateY(25px); background: hsl(0, 80%, 60%); box-shadow: 0 0 20px hsl(0, 80%, 60%); color: hsl(0, 80%, 60%); } 50% { transform: translateY(-25px); background: hsl(180, 80%, 60%); box-shadow: 0 0 20px hsl(180, 80%, 60%); color: hsl(180, 80%, 60%); } 100% { transform: translateY(25px); background: hsl(360, 80%, 60%); box-shadow: 0 0 20px hsl(360, 80%, 60%); color: hsl(360, 80%, 60%); } }
    @keyframes art6Bloom { 0%, 30% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(2.5); opacity: 0.8; } 100% { transform: scale(5); opacity: 0; } }
    @keyframes art6ShatterDrop { 0% { transform: translate(0, 0) rotate(0deg); opacity: 1; } 15% { transform: translate(5px, 5px) rotate(15deg); opacity: 1; } 35% { transform: translate(15px, 30px) rotate(45deg); opacity: 0.5; } 100% { transform: translate(20px, 120px) rotate(90deg); opacity: 0; } }

    .preview-art7 { position: absolute; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .art7-face { width: 40px; height: 50px; border: 2px solid #fff; border-radius: 40% 40% 60% 60%; position: relative; animation: art7Cycle 6s infinite step-end; }
    .art7-link { position: absolute; background: #fff; height: 1px; width: 0; top: 50%; left: 50%; animation: art7LinkAnim 6s infinite; }
    .art7-link:nth-child(2) { transform: rotate(45deg); animation-delay: 0.1s; } .art7-link:nth-child(3) { transform: rotate(135deg); animation-delay: 0.2s; }
    @keyframes art7Cycle { 0% { border-color: #fff; background: transparent; box-shadow: none; transform: scale(1); } 40% { border-color: #fff; background: rgba(0, 255, 255, 0.1); box-shadow: 0 0 20px #0ff; transform: scale(1.1); border-width: 3px; } 50% { border-color: #444; background: #333; box-shadow: none; transform: scale(1); border-width: 1px; } 95% { border-color: #fff; background: transparent; } }
    @keyframes art7LinkAnim { 0% { width: 0; opacity: 0; } 40% { width: 60px; opacity: 1; box-shadow: 0 0 5px #0ff; } 50% { width: 0; opacity: 0; } 100% { width: 0; opacity: 0; } }

    .preview-art8 { position: absolute; inset: 0; background: #020202; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .art8-scene { width: 100%; height: 100%; position: relative; animation: art8SceneRotate 10s linear infinite; }
    .art8-p { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; opacity: 0.7; }
    .art8-p:nth-child(1) { top: 20%; left: 20%; animation: art8Move1 4s ease-in-out infinite alternate; }
    .art8-p:nth-child(2) { top: 80%; left: 30%; animation: art8Move2 4s ease-in-out infinite alternate; }
    .art8-p:nth-child(3) { top: 50%; left: 80%; animation: art8Move3 4s ease-in-out infinite alternate; }
    .art8-l { position: absolute; background: var(--accent); height: 1px; transform-origin: 0 0; opacity: 0; animation: art8LineAppear 4s ease-in-out infinite alternate; }

    @keyframes art9RebelTarget { 0%, 20% { transform: translate(40px, 0) scale(1); background: #ef4444; } 40% { transform: translate(0, 0) scale(1.5); background: #fff; box-shadow: 0 0 20px #f0f; } 50%, 100% { transform: translate(0, -150px) scale(0); background: #fff; } }

    @keyframes art10Struggle { 0%, 40% { transform: rotate(0deg); border-color: #555; box-shadow: none; } 10%, 30% { transform: rotate(5deg); border-color: #d23838; } 20%, 35% { transform: rotate(-5deg); border-color: #d23838; } 45% { transform: rotate(0deg); border-color: #555; } 50% { border-color: #00FFC8; transform: rotate(0deg); box-shadow: 0 0 15px #00FFC8; } 100% { border-color: #00FFC8; transform: rotate(360deg); box-shadow: 0 0 15px #00FFC8; } }
    @keyframes art10Connect { 0%, 45% { opacity: 0; transform: scale(0); } 50%, 100% { opacity: 1; transform: scale(1); } }

    .art11-popup:nth-child(2) { background: #ff4444; top: 30%; right: 25%; animation-delay: 0s; } .art11-popup:nth-child(3) { background: #25d366; bottom: 30%; left: 25%; animation-delay: 2s; }

<body>

<!-- Film Grain Texture -->

<header class="museum-header" id="header">
    <h1>Reflections</h1>

    <div class="scroll-indicator">Scroll to Explore</div>

<main class="exhibition-list" id="gallery">

</main>

<!-- 底部導航儀表板 -->

    </div>

        <!-- JS 生成節點 -->

</nav>

<!-- 全螢幕展區 (獨立空間防重疊 ＋ 深色高級賞析面板) -->
<div class="viewer" id="viewer">
    <div class="ui-top-bar">

    </div>
    <div class="viewer-content">
        <iframe id="art-frame"></iframe>
        <div class="analysis-panel" id="analysis-panel">
            <h3 id="analysis-title"></h3>
            <p id="analysis-text"></p>
        </div>
    </div>
</div>

<script>
    const exhibits = [
        { id: 1, url: "art1.html", num: "NO. 01", title: "失焦矩陣", subtitle: "社交媒體與注意力的瓦解", previewHTML: `<div class="preview-art1">${'<div></div>'.repeat(30)}</div>`, analysis: "這件互動裝置具象化了數位時代的專注力危機。游標的每一次移動與點擊，都如同我們在社交媒體上的無心滑動，看似微不足道，卻不斷累積著混亂的變數。當外在的刺激超過臨界點，原本整齊的認知矩陣將徹底崩解。作品靜靜拋出一個提問：在碎片化資訊的洪流中，我們該如何守護內在的秩序。" },
        { id: 2, url: "art2.html", num: "NO. 02", title: "重構與歸類", subtitle: "從碎片堆疊到框架思考", previewHTML: `<div class="preview-art2"><div class="art2-frame"><div class="art2-block"></div></div></div>`, analysis: "學習的過程往往面臨兩種截然不同的路徑。盲目堆積零散的細節，如同在沒有地基的狀態下築起高塔，隨時可能因微小的失衡而全面崩潰。相反地，建立宏觀的框架，則是先為知識劃定清晰的網格，讓繁雜的碎片能夠精準歸位。這組對比裝置揭示了系統化思考的價值：唯有先看見整體的輪廓，局部的細節才能找到安放的座標。" },
        { id: 3, url: "art3.html", num: "NO. 03", title: "徒勞的完美", subtitle: "完美主義的無盡迴圈與崩潰", previewHTML: `<div class="preview-art3">${'<div class="p-dot"></div>'.repeat(16)}</div>`, analysis: "這件互動裝置精準地諷刺了學生在學習過程中對「完美」的過度執著。畫布上微小的瑕疵總誘使我們去修正，但如同現實中的「打地鼠」，過度苛求細節的代價，往往是引發更多預料之外的混亂。當修復的動作本身成為破壞整體結構的根源，作品揭示了一個殘酷的悖論：無止盡的完美主義，終究是一場徒勞無功的自我消耗。有時候，接受適度的不完美，才是維持系統運作的正解。" },
        { id: 4, url: "art4.html", num: "NO. 04", title: "算計與詩篇", subtitle: "即時成就感與延遲的靈魂", previewHTML: `<div class="preview-art4"><div class="art4-poem">用數字填滿留白，連靈魂也無法閱讀。</div><div class="art4-math">+100</div><div class="art4-math">8923</div><div class="art4-ring"></div></div>`, analysis: "這件作品諷刺了當代學生過度追求量化成績與「即時滿足」的現象。畫面上不斷彈出的數字，象徵著算計與速成的成就感，你可以輕易透過點擊與滑動獲得分數；但代價是，代表內涵的文學詩篇會逐漸被亂碼吞噬。語文的學習沒有捷徑，它需要「延遲滿足」——唯有當你克制住追逐分數的衝動，在空白處耐心長按停留，拒絕干擾，文字真正的意義與美麗才會向你顯現。" },
        { id: 5, url: "art5.html", num: "NO. 05", title: "Absorb？Apply？", subtitle: "無用之用", previewHTML: `<div class="preview-art5"><div class="art5-aura"></div><div class="art5-laser"></div><div class="art5-laser"></div><div class="art5-laser"></div><div class="art5-core"></div></div>`, analysis: "這件互動裝置以浩瀚宇宙為隱喻，演繹了我們面對深層知識時兩種截然不同的態度。作品揭示了學習的真相：無用的知識往往才是滋養靈魂的深邃養分，而過度追求即時變現的學習，終將導致精神世界的貧瘠與荒蕪。" },
        { id: 6, url: "art6.html", num: "NO. 06", title: "軌跡與灰燼", subtitle: "急躁的代價與慢活的詩意", previewHTML: `<div class="preview-art6"><div class="art6-slow"></div><div class="art6-fast-container"><div class="art6-fast"></div></div></div>`, analysis: "這件互動裝置具象化了現代人急功近利的焦慮。當你急於求成、在畫布上快速拖曳時，留下的只有枯燥、脆弱且註定碎裂墜落的灰色線條；而當你願意慢下來，沉穩地感受當下的軌跡，畫面便會隨著時間流轉，綻放出絢麗的光彩與生命力。作品溫柔地提醒我們：唯有學會欣賞過程的緩慢，生活才會向我們展露它真實的美麗；急躁求來的結果，終究只是沒有根基、轉瞬即逝的灰燼。" },
        { id: 7, url: "art7.html", num: "NO. 07", title: "靈魂代幣", subtitle: "效率的代價與思維的石化", previewHTML: `<div class="preview-art7"><div class="art7-link"></div><div class="art7-link"></div><div class="art7-face"></div></div>`, analysis: "這件互動裝置是對人工智慧時代的警世寓言。當我們沈迷於 AI 帶來的高效與便捷，大腦中負責深度連結的神經元卻在悄然斷裂。作品中，當你追求運算速度時，畫面會爆發出耀眼的光芒，但這光芒轉瞬即逝，隨之而來的是死寂的灰色與凝固的線條。這象徵著思維外包後的終局——我們獲得了完美的答案，卻失去了提問的靈魂，最終化為資訊洪流中一座座無法思考的石像。" },
        { id: 8, url: "art8.html", num: "NO. 08", title: "點的狹隘", subtitle: "點、線、面與思維的維度", previewHTML: `<div class="preview-art8"><div class="art8-scene"><div class="art8-f"></div><div class="art8-p"></div><div class="art8-p"></div><div class="art8-p"></div><div class="art8-l" style="top:35%; left:45%; transform:rotate(60deg);"></div><div class="art8-l" style="top:55%; left:40%; transform:rotate(0deg);"></div><div class="art8-l" style="top:55%; left:60%; transform:rotate(-120deg);"></div></div></div>`, analysis: "這件互動裝置以極簡的幾何演變，諷刺了學生常將科目視為互不相干的孤島。在畫面左側，知識只是混沌、離散的點；當你主動介入，試圖尋找關聯，這些點才開始連成線，進而結成面，最終構建出完整的立體思維結構。唯有懂得觸類旁通，將不同學科的邏輯相互映射，我們才能突破平面的局限，看見知識全貌的立體之美。" },
        { id: 9, url: "art9.html", num: "NO. 09", title: "循規與破局", subtitle: "慣性思維的迷宮與主動出擊的智慧", previewHTML: `<div class="preview-art9"><div class="art9-maze"></div><div class="art9-p1"></div><div class="art9-p2"></div><div class="art9-burst"></div></div>`, analysis: "這件互動裝置直擊了學習過程中常見的「思維僵化」。畫面上雖然提供了方向鍵，誘使你操控藍球乖乖走完迷宮；但如果你只懂得循規蹈矩地按部就班，最終往往會耗盡精力，淪為流水線上不知變通的灰色方塊。\n\n真正的隱藏破局之法，在於無視那些預設的按鍵——請直接用滑鼠或手指按住代表目標的「紅球」，將它拖曳到藍球身邊。當你跳出既定規則，僵化的迷宮框架便會瞬間粉碎，化為衝破維度的絢麗星辰。" },
        { id: 10, url: "art10.html", num: "NO. 10", title: "無效的用功", subtitle: "用功不是為了感動自己", previewHTML: `<div class="preview-art10"><div class="art10-core-p"></div><div class="art10-node-p"></div><div class="art10-line-p"></div></div>`, analysis: "這件互動裝置揭示了學習與工作中關於努力的真相。如果你試圖直接轉動輪子，你會發現阻力巨大，車輪會震動發紅，最終甚至會石化卡死——這象徵著盲目刷題與死記硬背的末路。唯有先將散落的知識節點與作為發亮的動力源接通，建立起完整的能量網絡，車輪才能在幾乎不費力的情況下自動運轉。" },
        { id: 11, url: "art11.html", num: "NO. 11", title: "定靜的試煉", subtitle: "在躁動世界重拾閱讀本能", previewHTML: `<div class="preview-art11"><div class="art11-text-beam"></div><div class="art11-popup"></div><div class="art11-popup"></div></div>`, analysis: "這件作品是一場關於專注力的數位修行。畫面上引用了《大學》的經典篇章，但周圍不斷彈出的社群通知試圖將你的視線拉走。機制極其殘酷卻寫實：滑鼠的每一次游移都代表心智的動搖，導致文字模糊難辨；唯有保持滑鼠與身體的絕對靜止，拒絕所有數位誘惑，清晰的真理才會浮現。" },
        { id: 12, url: "art12.html", num: "NO. 12", title: "控制的幻覺", subtitle: "努力的落點與命運的紅線", previewHTML: `<div class="preview-art12"><div class="art12-limit-line"></div><div class="art12-ball-drop"></div><div class="art12-ball-drop"></div><div class="art12-stack-bar"></div><div class="art12-stack-bar"></div></div>`, analysis: "這件作品以釘板的機率遊戲，辯證了「努力」的真實價值。雖然落下的路徑充滿隨機變數，但你投入的蓄力越深，光球便越有機會落入高分的區間——這證明努力並非徒勞。作品試圖傳達的，還有一種在積極進取後的釋懷：我們能完全掌控的只有手中的力度，至於結果的些許偏差，我們只能學會優雅地接受。" },
        
        // ▼ 新增這一段 NO.13 ▼
        { 
            id: 13, 
            url: "art13.html", 
            num: "NO. 13", 
            title: "佔有與陪伴", 
            subtitle: "執念的枷鎖與共鳴的自由", 
            previewHTML: `<div class="preview-art13"><div class="art13-line"></div><div class="art13-dot"></div><div class="art13-center"></div></div>`, 
           analysis: "這件互動裝置深刻剖析了人際關係的本質，以及我們面對相聚與離別的態度。當我們懷抱控制慾，試圖強行捕捉並綁定周遭的個體時，換來的往往是恐懼、逃離，以及過度拉扯所留下的暗色傷疤。\n\n此外，作品的深意更在於揭示一個無奈卻美麗的生命常態：無論是朋友、戀人還是家人，每個人的人生軌跡都有屬於自己的「終點站」。他們注定只會在生命的某個階段與我們並肩同行，離別是必然的宿命。\n\n當我們放下緊抓不放的執念，以共鳴取代佔有，便能看見彼此交會時綻放的溫暖光芒。真正的愛與成熟，是懂得在他們到站離去時不再強留；學會坦然接受緣分的聚散，目送他們化作璀璨的光點，優雅而無憾地告別。"
        }
    ];

    const ITEMS_PER_SECTOR = 4;
    let currentSector = 0;
    const totalSectors = Math.ceil(exhibits.length / ITEMS_PER_SECTOR);
    const gallery = document.getElementById('gallery');

    function init() {
        document.getElementById('total-sector-display').innerText = totalSectors.toString().padStart(2, '0');
        renderNavNodes();
        renderSector(0, false);
        initSmoothScroll();
    }

    function renderNavNodes() {
        const track = document.getElementById('nav-track');
        track.innerHTML = '';
        for (let i = 0; i < totalSectors; i++) {
            const node = document.createElement('div');
            node.className = 'nav-node';
            
            if (window.innerWidth > 768) {
                node.addEventListener('mousemove', (e) => {
                    const rect = node.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    gsap.to(node, { x: x * 0.4, y: y * 0.4, duration: 0.3, ease: 'power2.out' });
                });
                node.addEventListener('mouseleave', () => {
                    gsap.to(node, { x: 0, y: 0, duration: 0.5, ease: 'elastic.out(1, 0.3)' });
                });
            }

            node.addEventListener('click', () => {
                if(i !== currentSector) renderSector(i, true);
            });
            track.appendChild(node);
        }
    }

    function renderSector(sectorIndex, shouldScrollToTop) {
        currentSector = sectorIndex;
        document.getElementById('current-sector-display').innerText = (sectorIndex + 1).toString().padStart(2, '0');
        
        document.querySelectorAll('.nav-node').forEach((node, idx) => {
            node.classList.toggle('active', idx === sectorIndex);
        });

        gsap.to('.exhibit-item', { opacity: 0, y: 30, duration: 0.3, stagger: 0.05, onComplete: () => {
            gallery.innerHTML = '';
            const sectorExhibits = exhibits.slice(sectorIndex * ITEMS_PER_SECTOR, (sectorIndex + 1) * ITEMS_PER_SECTOR);

            sectorExhibits.forEach((ex) => {
                const article = document.createElement('article');
                article.className = 'exhibit-item';
                article.innerHTML = `
                    <div class="exhibit-bg-num">${ex.num.split(' ')[1]}</div>
                    <div class="exhibit-content-wrapper">
                        <div class="exhibit-info">
                            <div class="exhibit-num">${ex.num}</div>
                            <h2 class="exhibit-title">${ex.title}</h2>
                            <div class="exhibit-desc">${ex.subtitle}</div>
                        </div>
                        <div class="preview-container">
                            ${ex.previewHTML}
                        </div>
                    </div>
                `;
                article.addEventListener('click', () => openViewer(ex));
                gallery.appendChild(article);
            });

            if(shouldScrollToTop) {
                const targetY = gallery.offsetTop - (window.innerWidth <= 768 ? 50 : 100);
                gsap.to(window, { scrollTo: targetY, duration: 0.8, ease: 'power3.inOut' });
            }

            initGSAPAnimations();
            if (window.innerWidth > 768) initDesktop3DTilt();
        }});
    }

    function initSmoothScroll() {
        const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)) });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
    }

    function initGSAPAnimations() {
        gsap.registerPlugin(ScrollTrigger);
        ScrollTrigger.refresh(); 
        
        const isMobile = window.innerWidth <= 768;

        gsap.utils.toArray('.exhibit-item').forEach(item => {
            gsap.to(item, {
                scrollTrigger: { trigger: item, start: "top 85%" },
                opacity: 1, y: 0, duration: 1.2, ease: "power3.out"
            });
            
            const bgNum = item.querySelector('.exhibit-bg-num');
            gsap.to(bgNum, {
                scrollTrigger: { trigger: item, start: "top bottom", end: "bottom top", scrub: 1 },
                y: isMobile ? 50 : -150, ease: "none"
            });

            if (isMobile) {
                const infoCard = item.querySelector('.exhibit-info');
                gsap.fromTo(infoCard, 
                    { y: 30 }, 
                    { scrollTrigger: { trigger: item, start: "top bottom", end: "bottom top", scrub: 1 }, y: -20, ease: "none" }
                );
            }
        });
    }

    function initDesktop3DTilt() {
        document.querySelectorAll('.exhibit-item').forEach(item => {
            const wrapper = item.querySelector('.exhibit-content-wrapper');
            item.addEventListener('mousemove', (e) => {
                const rect = item.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                gsap.to(wrapper, { rotateY: x * 10, rotateX: -y * 10, duration: 0.6, ease: 'power2.out' });
            });
            item.addEventListener('mouseleave', () => {
                gsap.to(wrapper, { rotateY: 0, rotateX: 0, duration: 1, ease: 'elastic.out(1, 0.3)' });
            });
        });
    }

    // --- 播放器操作邏輯 ---
    const viewer = document.getElementById('viewer');
    const artFrame = document.getElementById('art-frame');
    const analysisPanel = document.getElementById('analysis-panel');

    function openViewer(exData) {
        artFrame.src = exData.url;
        document.getElementById('analysis-title').innerText = exData.title;
        document.getElementById('analysis-text').innerText = exData.analysis;
        
        viewer.classList.add('active');
        document.getElementById('nav-deck').classList.add('nav-hidden');
        analysisPanel.classList.remove('show');
    }

    document.getElementById('btn-close').addEventListener('click', () => {
        viewer.classList.remove('active');
        analysisPanel.classList.remove('show');
        document.getElementById('nav-deck').classList.remove('nav-hidden');
        setTimeout(() => { artFrame.src = ""; }, 800);
    });

    document.getElementById('btn-info').addEventListener('click', () => {
        analysisPanel.classList.toggle('show');
    });

    window.onload = init;
</script>
</body>
</html>
