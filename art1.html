<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #ffffff;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: default;
        /* 必須加入這行：禁止手機原生的下拉刷新與滾動，讓觸控完全交給JS處理 */
        touch-action: none; 
        overscroll-behavior: none;
    }
    #c {
        display: grid;
        grid-template-columns: repeat(15, min(4vw, 20px));
        gap: min(1vw, 4px);
    }
    .b {
        width: min(4vw, 20px);
        height: min(4vw, 20px);
        background: #000000;
        border-radius: 2px;
        transition: transform 0.1s, background 0.3s, border-radius 0.3s;
        will-change: transform;
    }
</style>
</head>
<body>
<div id="c"></div>
<script>
    const c = document.getElementById('c');
    let chaos = 0;

    // 創建矩陣
    for(let i = 0; i < 225; i++) {
        let d = document.createElement('div');
        d.className = 'b';
        c.appendChild(d);
    }

    const blocks = document.querySelectorAll('.b');

    // 獲取螢幕尺寸，防止手機端縮放比例過大變成純色
    const isMobile = window.innerWidth < 768;
    const maxScale = isMobile ? 4 : 8; // 手機最多放大4倍，電腦8倍
    const maxTranslate = isMobile ? window.innerWidth * 1.5 : 3000;

    function triggerChaos() {
        chaos += 0.005;
        
        blocks.forEach(b => {
            if (Math.random() < chaos) {
                b.style.position = chaos > 0.4 ? 'absolute' : 'relative';
                
                // 使用限制後的位移與縮放參數
                const rx = (Math.random() - 0.5) * chaos * maxTranslate;
                const ry = (Math.random() - 0.5) * chaos * maxTranslate;
                const rz = Math.random() * chaos * 1000;
                
                // 限制最大縮放，避免蓋住整個畫面
                let rs = 1 + Math.random() * chaos * 5;
                if (rs > maxScale) rs = maxScale;
                
                b.style.transform = `translate(${rx}px, ${ry}px) rotate(${rz}deg) scale(${rs})`;
                
                if (chaos > 0.6) {
                    b.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                    b.style.borderRadius = Math.random() > 0.5 ? '50%' : '0%';
                }
            }
        });

        if (chaos > 1.2) {
            document.body.style.background = `hsl(${Math.random() * 360}, 100%, ${Math.random() * 100}%)`;
        }
    }

    // 滑鼠事件
    window.addEventListener('mousemove', triggerChaos);
    window.addEventListener('click', () => { chaos += 0.2; });

    // 手機觸控事件 (touchmove 讓手指滑動時也能不斷觸發)
    window.addEventListener('touchmove', (e) => {
        e.preventDefault(); // 攔截默認滾動
        triggerChaos();
    }, { passive: false });
    
    // 點擊螢幕瞬間也增加混亂
    window.addEventListener('touchstart', () => {
        chaos += 0.2;
    }, { passive: true });
</script>
</body>
</html>
